<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Client Files · Achi Scaffolding ERP</title>
<style>
  /* ACHI palette. Mirrors deploy/overrides/achi-theme.css — kept in sync by hand,
     because this page is served by our module and never sees upstream's stylesheet. */
  :root{
    --navy:#284F9E; --navy-d:#1F3F80; --accent:#3D6BC4; --light:#E3EDFB;
    --bg:#fff; --bg-2:#f5f5f7; --bd:#d2d2d7; --bd-l:#e8e8ed;
    --tx:#1d1d1f; --tx-2:#5b5e66; --tx-3:#8a8f98;
    --r:8px; --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:var(--tx);background:var(--bg-2)}
  header{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px}
  header h1{font-size:16px;font-weight:600}
  header .sp{flex:1}
  header .who{font-size:12px;opacity:.75}
  main{max-width:1200px;margin:20px auto;padding:0 16px}
  .card{background:#fff;border:1px solid var(--bd-l);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:16px}
  .card h2{font-size:13px;font-weight:600;color:var(--tx-2);padding:12px 16px;border-bottom:1px solid var(--bd-l)}
  .body{padding:16px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  label{display:block;font-size:11px;font-weight:600;color:var(--tx-3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
  input,select,textarea{font:inherit;padding:7px 9px;border:1px solid var(--bd);border-radius:6px;background:#fff;min-width:0}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent)}
  .f{flex:1 1 160px}
  button{font:inherit;font-weight:600;padding:8px 14px;border:0;border-radius:99px;background:var(--navy);color:#fff;cursor:pointer}
  button:hover{background:var(--accent)}
  button.ghost{background:transparent;color:var(--navy);border:1px solid var(--bd)}
  button.ghost:hover{background:var(--light)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;font-weight:600;color:var(--tx-3);text-transform:uppercase;letter-spacing:.4px;padding:8px 12px;border-bottom:1px solid var(--bd-l)}
  td{padding:9px 12px;border-bottom:1px solid var(--bd-l);vertical-align:middle}
  tr:last-child td{border-bottom:0}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:var(--light)}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;background:var(--bg-2);color:var(--tx-2);white-space:nowrap}
  .s-prospect{background:#eef2f9;color:#3a4a6b}.s-lead{background:#e6f0fd;color:#1e4b8f}
  .s-site_survey{background:#fff4e0;color:#8a5a12}.s-measurements{background:#e9f6ee;color:#1a6b3c}
  .st-open{background:#e6f0fd;color:#1e4b8f}.st-done{background:#e9f6ee;color:#1a6b3c}
  .st-cancelled{background:#fdeaea;color:#8f2020}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--tx-2)}
  .muted{color:var(--tx-3)}
  .err{background:#fdeaea;color:#8f2020;padding:10px 14px;border-radius:6px;margin-bottom:12px;display:none}
  dialog{border:0;border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.2);padding:0;max-width:640px;width:92%}
  dialog::backdrop{background:rgba(0,0,0,.4)}
  dialog .body{max-height:70vh;overflow:auto}
  .foot{display:flex;justify-content:flex-end;gap:8px;padding:12px 16px;border-top:1px solid var(--bd-l)}
  .log{border-left:2px solid var(--bd);padding:6px 0 6px 12px;margin-bottom:10px}
  .log .t{font-size:11px;color:var(--tx-3)}
  .hide{display:none}
</style>
</head>
<body>
<header>
  <strong>ACHI</strong><h1>Client Files</h1><div class="sp"></div>
  <span class="who" id="who"></span>
</header>

<main>
  <div class="err" id="err"></div>

  <div class="card">
    <h2>Open a file</h2>
    <div class="body">
      <div class="row">
        <div><label>Type</label>
          <select id="isco"><option value="0">Person</option><option value="1">Company</option></select></div>
        <div class="f" id="w-prefix"><label>Title</label>
          <select id="prefix"><option value=""></option><option>Mr.</option><option>Ms.</option><option>Mrs.</option><option>Dr.</option><option>Eng.</option><option>Arch.</option></select></div>
        <div class="f" id="w-first"><label>First name</label><input id="first"></div>
        <div class="f" id="w-last"><label>Last name</label><input id="last"></div>
        <div class="f hide" id="w-co"><label>Company name</label><input id="co"></div>
      </div>
      <div class="row" style="margin-top:12px">
        <div class="f"><label>Mobile</label><input id="mobile" placeholder="+961…"></div>
        <div class="f"><label>Email</label><input id="email" type="email" placeholder="used to match existing contacts"></div>
        <div class="f"><label>City</label><input id="city"></div>
        <div class="f" style="flex:2 1 240px"><label>Subject</label><input id="subject" placeholder="Facade scaffolding — 6 floors"></div>
        <div><button id="create">Open file</button></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Files <span class="muted" id="count"></span></h2>
    <div class="body" style="padding:12px 16px">
      <div class="row">
        <div><label>Stage</label><select id="fstage"><option value="">All</option><option>prospect</option><option>lead</option><option>site_survey</option><option>measurements</option></select></div>
        <div><label>Status</label><select id="fstatus"><option value="">All</option><option>open</option><option>scheduled</option><option>viewed</option><option>cancelled</option><option>done</option></select></div>
        <div><button class="ghost" id="refresh">Refresh</button></div>
      </div>
    </div>
    <table>
      <thead><tr><th>File</th><th>Contact</th><th>Subject</th><th>Stage</th><th>Status</th><th>City</th><th>Project</th></tr></thead>
      <tbody id="rows"><tr><td colspan="7" class="muted" style="padding:24px;text-align:center">Loading…</td></tr></tbody>
    </table>
  </div>
</main>

<dialog id="dlg">
  <h2 style="padding:14px 16px;border-bottom:1px solid var(--bd-l);font-size:15px" id="d-title">File</h2>
  <div class="body">
    <div id="d-meta" style="margin-bottom:16px"></div>
    <h2 style="padding:0 0 8px;border:0">Add a log</h2>
    <div class="row">
      <div><label>Type</label><select id="l-type">
        <option value="inbound_call">Inbound call</option><option value="outbound_call">Outbound call</option>
        <option value="quotation">Quotation</option><option value="field">Field</option>
        <option value="job">Job</option><option value="transfer">Transfer</option><option value="note">Note</option>
      </select></div>
      <div class="f" style="flex:3 1 260px"><label>Description</label><input id="l-desc"></div>
      <div><label>Follow-up</label><input id="l-fu" type="date"></div>
      <div><button id="l-add">Add</button></div>
    </div>
    <hr style="border:0;border-top:1px solid var(--bd-l);margin:16px 0">
    <div id="d-logs"></div>
  </div>
  <div class="foot"><button class="ghost" id="d-close">Close</button></div>
</dialog>

<script>
// Same origin as the SPA, so we read the token it already stored. No second login.
const TOKEN = localStorage.getItem('oe_access_token');
const API = '/api/v1/achi';
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function fail(msg) { const e = $('err'); e.textContent = msg; e.style.display = 'block'; }

async function api(path, opts = {}) {
  const r = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN, ...(opts.headers || {}) },
  });
  if (r.status === 401) { fail('Session expired — open the main app, sign in, then reload this page.'); throw new Error('401'); }
  const body = await r.json().catch(() => ({}));
  if (!r.ok) {
    // FastAPI validation errors arrive as a list of {loc,msg}; surface the message
    // rather than "[object Object]", which is what tells you nothing at 5pm.
    const d = body.detail;
    throw new Error(Array.isArray(d) ? d.map(x => x.msg).join('; ') : (d || r.status));
  }
  return body;
}

// ── Person vs company: swap which name fields are shown/required ────────
$('isco').onchange = () => {
  const co = $('isco').value === '1';
  ['w-prefix','w-first','w-last'].forEach(i => $(i).classList.toggle('hide', co));
  $('w-co').classList.toggle('hide', !co);
};

$('create').onclick = async () => {
  $('err').style.display = 'none';
  const co = $('isco').value === '1';
  const person = co
    ? { is_company: true, company_name: $('co').value.trim() }
    : { is_company: false, prefix: $('prefix').value || null,
        first_name: $('first').value.trim() || null, last_name: $('last').value.trim() || null };
  person.mobile = $('mobile').value.trim() || null;
  person.email = $('email').value.trim() || null;
  try {
    await api('/files/', { method: 'POST', body: JSON.stringify({
      person, subject: $('subject').value.trim(), city: $('city').value.trim() || null, stage: 'prospect',
    })});
    ['co','first','last','mobile','email','city','subject'].forEach(i => $(i).value = '');
    load();
  } catch (e) { fail(e.message); }
};

function pill(v, p) { return `<span class="pill ${p}${v}">${esc(v)}</span>`; }

async function load() {
  const q = new URLSearchParams();
  if ($('fstage').value) q.set('stage', $('fstage').value);
  if ($('fstatus').value) q.set('status', $('fstatus').value);
  try {
    const rows = await api('/files/?' + q);
    $('count').textContent = `· ${rows.length}`;
    $('rows').innerHTML = rows.length ? rows.map(r => `
      <tr data-id="${r.id}">
        <td class="mono">${esc(r.file_number)}</td>
        <td><strong>${esc(r.contact_name || '—')}</strong></td>
        <td>${esc(r.subject) || '<span class="muted">—</span>'}</td>
        <td>${pill(r.stage, 's-')}</td>
        <td>${pill(r.status, 'st-')}</td>
        <td>${esc(r.city) || '<span class="muted">—</span>'}</td>
        <td>${r.project_id ? '<span class="pill st-done">converted</span>' : '<span class="muted">—</span>'}</td>
      </tr>`).join('')
      : '<tr><td colspan="7" class="muted" style="padding:24px;text-align:center">No files yet.</td></tr>';
    $('rows').querySelectorAll('tr[data-id]').forEach(tr => tr.onclick = () => open(tr.dataset.id));
  } catch (e) { fail(e.message); }
}

let current = null;
async function open(id) {
  try {
    const f = await api('/files/' + id);
    current = f;
    $('d-title').textContent = `${f.file_number} · ${f.contact_name || ''}`;
    $('d-meta').innerHTML = `
      <div class="row">
        <div>${pill(f.stage,'s-')}</div><div>${pill(f.status,'st-')}</div>
        <div class="muted">${esc(f.subject || '')}</div>
      </div>
      <div class="muted" style="margin-top:8px;font-size:12px">
        ${esc([f.street, f.city, f.country].filter(Boolean).join(', ')) || 'No location'}
        ${f.project_id ? ' · converted to a project' : ''}
      </div>`;
    renderLogs(f.logs || []);
    $('dlg').showModal();
  } catch (e) { fail(e.message); }
}

function renderLogs(logs) {
  $('d-logs').innerHTML = logs.length
    ? logs.slice().sort((a,b) => (b.created_at||'').localeCompare(a.created_at||''))
        .map(l => `<div class="log">
          <div class="t">${esc(l.log_type)} · ${esc((l.occurred_at || l.created_at || '').slice(0,16).replace('T',' '))}
          ${l.follow_up_date ? ' · follow-up ' + esc(l.follow_up_date) : ''}</div>
          <div>${esc(l.description) || '<span class="muted">—</span>'}</div>
        </div>`).join('')
    : '<div class="muted">No logs yet.</div>';
}

$('l-add').onclick = async () => {
  if (!current) return;
  try {
    await api(`/files/${current.id}/logs/`, { method: 'POST', body: JSON.stringify({
      log_type: $('l-type').value,
      description: $('l-desc').value.trim(),
      follow_up_date: $('l-fu').value || null,
    })});
    $('l-desc').value = ''; $('l-fu').value = '';
    const f = await api('/files/' + current.id);
    current = f; renderLogs(f.logs || []);
  } catch (e) { fail(e.message); }
};

$('d-close').onclick = () => $('dlg').close();
$('refresh').onclick = load;
$('fstage').onchange = load;
$('fstatus').onchange = load;

if (!TOKEN) fail('Not signed in. Open the main app, sign in, then reload this page.');
else { api('/info').then(i => $('who').textContent = `${i.module} v${i.version}`).catch(() => {}); load(); }
</script>
</body>
</html>
