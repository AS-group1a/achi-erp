<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Call Log · Achi Scaffolding ERP</title>
<style>
  :root{
    --navy:#284F9E; --navy-d:#1F3F80; --navy-2:#305FB8; --accent:#3D6BC4; --light:#E3EDFB;
    --bd:#dfe4ec; --hair:#eef1f6; --tx:#1d1d1f; --tx-2:#5b5e66; --tx-3:#8a8f98;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:var(--tx);background:#f5f5f7}
  header{background:var(--navy);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px}
  header h1{font-size:16px;font-weight:600}
  header .sp{flex:1}
  header .who{font-size:12px;opacity:.75}
  main{margin:0;padding:16px 18px 40px}
  .err{background:#fde8e8;color:#ba0517;border:1px solid #f5a0a0;padding:10px 14px;border-radius:8px;margin-bottom:12px;display:none}
  .feedback{position:fixed;inset:0;z-index:2147483000;display:flex;align-items:flex-start;justify-content:center;padding:72px 20px 20px;background:rgba(15,35,75,.24);backdrop-filter:blur(2px)}
  .feedback-box{width:min(430px,calc(100vw - 32px));overflow:hidden;border:1px solid #d8e3f3;border-top:4px solid var(--navy);border-radius:18px;background:#fff;box-shadow:0 24px 64px rgba(15,23,42,.18),0 4px 14px rgba(15,23,42,.08)}
  .feedback-head{padding:14px 20px;border-bottom:1px solid #dce6f5;background:linear-gradient(135deg,#edf4ff 0%,#f7faff 58%,#fff 100%);color:#1e3f85;font-size:16px;font-weight:800}
  .feedback-body{padding:20px;color:#334155;font-size:13.5px;line-height:1.65}
  .feedback-foot{display:flex;justify-content:flex-end;padding:12px 20px;border-top:1px solid #eef2f7;background:#f8fafc}
  .feedback-ok{min-width:72px;height:36px;border:0;border-radius:9px;background:linear-gradient(135deg,#1e3f85,#284f9e);color:#fff;font:inherit;font-size:12px;font-weight:800;cursor:pointer}
  .email-invalid{border-color:#284f9e!important;box-shadow:0 0 0 3px rgba(40,79,158,.16)!important}
  .email-btn{display:inline-flex;align-items:center;gap:6px;border:0;background:transparent;color:var(--navy);font:inherit;font-size:12.5px;cursor:pointer;padding:3px 0;text-decoration:none}
  .email-btn:hover{text-decoration:underline}
  .email-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .draft-email{display:flex;align-items:center;gap:5px;width:100%}
  .draft-email .din{min-width:0;flex:1}
  .draft-compose{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;flex:0 0 28px;border:1.5px solid #bfdbfe;border-radius:50%;background:#eff6ff;color:var(--navy);cursor:pointer;padding:0}
  .draft-compose:hover{background:#dbeafe}
  .draft-compose[hidden]{display:none}
  .draft-compose svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .compose{position:fixed;right:28px;bottom:0;z-index:2147482300;width:min(480px,calc(100vw - 24px));overflow:hidden;border:1.5px solid #cbd9f1;border-bottom:0;border-radius:12px 12px 0 0;background:#fff;box-shadow:0 -4px 32px rgba(0,0,0,.16);animation:compose-in .18s cubic-bezier(.2,0,.2,1) both}
  @keyframes compose-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .compose-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(135deg,#1e3f85,#284f9e);color:#fff}
  .compose-title{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;letter-spacing:.02em}
  .compose-title svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .compose-close{width:28px;height:28px;border:0;border-radius:50%;background:rgba(255,255,255,.18);color:#fff;font-size:19px;line-height:1;cursor:pointer}
  .compose-close:hover{background:rgba(255,255,255,.32)}
  .compose-row{display:flex;align-items:center;min-height:44px;padding:0 20px;border-bottom:1px solid #f0f0f5}
  .compose-label{width:64px;flex-shrink:0;color:#9ca3af;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  .compose-recipient{display:inline-flex;align-items:center;padding:5px 10px;border:1.5px solid #bfdbfe;border-radius:99px;background:#eff6ff;color:#1e40af;font-size:12px;font-weight:500}
  .compose-subject{flex:1;border:0;outline:0;background:transparent;color:#111827;font:inherit;font-size:13px}
  .compose-subject::placeholder,.compose-body::placeholder{color:#d1d5db}
  .compose-body{display:block;width:100%;min-height:210px;padding:16px 20px;border:0;outline:0;resize:none;color:#374151;font:inherit;font-size:13px;line-height:1.7}
  .compose-foot{display:flex;align-items:center;gap:8px;padding:12px 16px;border-top:1.5px solid #e8e8f0;background:#f6f9fe}
  .compose-send{padding:8px 22px;border:0;border-radius:99px;background:linear-gradient(135deg,#1e3f85,#284f9e);color:#fff;font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;box-shadow:0 7px 18px rgba(30,63,133,.22)}
  .compose-mailto{padding:8px 14px;border:1.5px solid #e0e0ea;border-radius:99px;background:#fff;color:#6b7280;font:inherit;font-size:12px;font-weight:600;cursor:pointer}
  .compose-mailto:hover{border-color:#1e3a8a;color:#1e3a8a;background:#eff6ff}

  .kpis{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap}
  .kpi{flex:1 1 180px;border-radius:14px;padding:15px 18px;color:#fff;transition:transform .15s ease}
  .kpi:hover{transform:translateY(-2px)}
  .kpi.btn{cursor:pointer}
  .kpi .n{font-size:28px;font-weight:900;line-height:1.05}
  .kpi .l{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
  .kpi .s{font-size:11px;opacity:.82}
  .k1{background:#0176d3}.k2{background:#032d60}.k3{background:#014486}.k4{background:#0e7490}
  .kpi.on{outline:3px solid rgba(255,255,255,.55);outline-offset:-3px}

  .shell{background:#fff;border:1px solid var(--bd);border-radius:14px;box-shadow:0 4px 20px rgba(40,79,158,.08);overflow:hidden}
  .nav{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;gap:12px;background:var(--navy);padding:11px 16px}
  .nav-actions{display:flex;align-items:center;gap:8px;justify-self:start}
  .nav-right{display:flex;align-items:center;gap:10px;justify-self:end;min-width:0}
  .cnt{font-size:11px;font-weight:800;color:rgba(255,255,255,.7)}
  .pt{position:relative;display:inline-flex;justify-self:center;background:rgba(0,0,0,.2);border-radius:99px;padding:4px}
  .pt-ind{position:absolute;top:4px;bottom:4px;background:#fff;border-radius:99px;box-shadow:0 2px 10px rgba(0,0,0,.22);transition:left .18s cubic-bezier(.2,0,.2,1),width .18s cubic-bezier(.2,0,.2,1)}
  .pill-tab{position:relative;z-index:1;border:0;background:transparent;padding:7px 15px;font-size:12.5px;font-weight:600;color:rgba(255,255,255,.58);cursor:pointer;white-space:nowrap;font-family:inherit}
  .pill-tab:hover{color:rgba(255,255,255,.88)}
  .pill-tab.on{color:var(--navy);font-weight:800}
  .search{height:32px;width:200px;border-radius:99px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.12);color:#fff;font:inherit;font-size:12.5px;padding:0 12px;outline:none}
  .search::placeholder{color:rgba(255,255,255,.42)}
  .tb-add{display:inline-flex;align-items:center;gap:7px;padding:8px 15px;border:0;border-radius:99px;background:#fff;color:var(--navy);font:inherit;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;box-shadow:0 3px 12px rgba(0,0,0,.22);transition:transform .15s,box-shadow .15s}
  .tb-add:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(0,0,0,.28)}
  .tb-add-plus{font-size:17px;line-height:1}
  .tb-select{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border:1.5px solid rgba(255,255,255,.55);border-radius:99px;background:rgba(255,255,255,.12);color:#fff;font:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s,transform .12s}
  .tb-select:hover{background:rgba(255,255,255,.22);border-color:#fff;transform:translateY(-1px)}
  .tb-select.on{background:#fff;color:var(--navy);border-color:#fff}
  .tb-select svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  /* delete selected */
  .tb-del{display:inline-flex;align-items:center;gap:6px;border:0;border-radius:99px;background:rgba(255,255,255,.1);color:#fca5a5;font:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;opacity:0;pointer-events:none;max-width:0;padding:0;overflow:hidden;transition:opacity .18s,max-width .18s}
  .tb-del.on{opacity:1;pointer-events:all;max-width:200px;padding:7px 13px;border:1.5px solid rgba(252,165,165,.45)}
  .tb-del:hover{background:rgba(239,68,68,.25);border-color:#fca5a5;color:#fff}
  .tb-del svg{width:13px;height:13px}
  .tb-cnt{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;background:#ef4444;color:#fff;font-size:10px;font-weight:800;padding:0 5px}
  /* phone: country-code picker + number */
  .tel-wrap{display:flex;align-items:center;gap:4px;width:100%}
  .tel-cc{display:inline-flex;align-items:center;gap:4px;flex:0 0 auto;height:30px;padding:0 6px;border:1px solid #cfd9e8;border-radius:6px;background:#fff;cursor:pointer;font:inherit;font-size:12px;color:#1e293b}
  .tel-cc:hover{border-color:var(--navy)}
  .tel-cc img{width:20px;height:15px;object-fit:cover;border-radius:2px;display:block}
  .tel-cc svg{width:11px;height:11px;opacity:.55}
  .tel-num{flex:1 1 auto;min-width:0}
  .cc-drop{position:fixed;z-index:2147482300;width:290px;background:#fff;border:1.5px solid #dfe4ec;border-radius:10px;box-shadow:0 12px 34px rgba(15,23,42,.22);overflow:hidden;display:none}
  .cc-drop.vis{display:block}
  .cc-search{width:100%;border:0;border-bottom:1px solid #eef1f6;padding:9px 11px;font:inherit;font-size:12.5px;outline:none}
  .cc-list{max-height:230px;overflow:auto}
  .cc-item{display:flex;align-items:center;gap:9px;padding:7px 11px;cursor:pointer;font-size:12.5px}
  .cc-item:hover{background:var(--navy);color:#fff}
  .cc-item img{width:22px;height:16px;object-fit:cover;border-radius:2px;flex:0 0 auto}
  .cc-name{flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cc-dial{font-variant-numeric:tabular-nums;opacity:.7;flex:0 0 auto}
  td.num{cursor:pointer}

  .tscroll{overflow:auto;height:var(--bh,58vh)}
  table{width:max-content;min-width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
  thead th{position:sticky;top:0;z-index:1;background:var(--navy);color:rgba(255,255,255,.82);font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;text-align:left;padding:10px 12px;white-space:nowrap}
  tbody td{height:40px;padding:0 12px;border-bottom:1px solid var(--hair);border-right:1px solid var(--hair);vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  tbody td.wide{max-width:340px}
  tbody tr.data:nth-child(even) td{background:#f8faff}
  tbody tr.data:hover td{background:#eef4fd}
  .num{width:46px;text-align:center}
  tbody tr.selectable-row td.num{cursor:pointer;user-select:none;padding:0}
  .rn{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:8px;background:#eff6ff;color:var(--navy);font-weight:800;font-size:11px}
  tbody tr.selectable-row:hover .rn{background:var(--navy);color:#fff}
  tbody tr.selectable-row.row-selected td{background:#dbeafe!important}
  tbody tr.selectable-row.row-selected:hover td{background:#bfdbfe!important}
  tbody tr.selectable-row.row-selected .rn{background:var(--navy);color:#fff}
  .dt{font-variant-numeric:tabular-nums;color:#334155}
  .mt{color:#9ca3af}
  .name{font-weight:700;color:#111827}
  .lnk{color:var(--navy);text-decoration:none}.lnk:hover{text-decoration:underline}
  .ph{font-variant-numeric:tabular-nums}
  .wa{display:inline-flex;align-items:center;justify-content:center;margin-left:6px;color:#15803d;background:#e7f5ee;border-radius:6px;padding:3px 5px;text-decoration:none}
  .wa svg{width:14px;height:14px;display:block}
  .avatar{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:#334f8a;color:#fff;font-size:10px;font-weight:800}
  .badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:99px;font-size:11px;font-weight:800;white-space:nowrap;border:1px solid transparent;text-transform:capitalize}
  .b-open{background:#e8f4fd;color:#014486;border-color:#b0d4f1}
  .b-scheduled{background:#ece9f5;color:#3e3794;border-color:#c5bde8}
  .b-viewed{background:#e0f5f5;color:#0a5f6e;border-color:#8dd5d8}
  .b-cancelled{background:#f3f3f3;color:#706e6b;border-color:#c9c7c5}
  .b-done{background:#eff9ef;color:#2e6b3e;border-color:#95d5a0}
  .tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;background:#f1f5f9;color:#475569;text-transform:capitalize;white-space:nowrap}
  /* maps cell (ported from the tabbed grid): Open button + copy + hover preview */
  .maps-cell{display:inline-flex;align-items:center;gap:5px}
  .maps-btn{display:inline-flex;align-items:center;gap:4px;color:#2563eb;text-decoration:none;font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px;background:#eff6ff;white-space:nowrap}
  .maps-btn:hover{background:#dbeafe}
  .maps-btn .pin{display:inline-flex;color:#ef4444}
  .maps-btn svg,.pin svg{width:13px;height:13px}
  .map-copy{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;border:1.5px solid #2563eb;background:#eff6ff;color:#2563eb;cursor:pointer;padding:0}
  .map-copy svg{width:12px;height:12px}
  .map-copy:hover{background:#dbeafe}
  .map-copy.copied{border-color:#16a34a;background:#dcfce7;color:#16a34a}
  .maps-popup{position:fixed;z-index:2147482100;background:#fff;border-radius:12px;border:1.5px solid #e8e8f0;box-shadow:0 8px 32px rgba(0,0,0,.18);overflow:hidden;width:240px;opacity:0;transition:opacity .15s;pointer-events:none}
  .maps-popup.vis{opacity:1;pointer-events:all}
  .maps-popup-inner{position:relative}
  .maps-popup iframe{width:240px;height:160px;border:none;display:block}
  /* expand affordance, ported from .pg-popup-expand */
  .popup-expand{position:absolute;top:6px;left:6px;width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,.88);border:1.5px solid #e8e8f0;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;color:#6b7280;transition:background .12s,color .12s,border-color .12s;padding:0}
  .popup-expand:hover{background:#eff6ff;color:#2563eb;border-color:#2563eb}
  .popup-expand svg{width:13px;height:13px}
  .maps-popup-fallback{padding:14px 12px;font-size:12px;color:#6b7280;white-space:normal;word-break:break-all}
  .maps-popup-url{padding:7px 12px;font-size:11px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-top:1px solid #f0f0f5}
  td.ed{cursor:text}
  td.ed:hover{box-shadow:inset 0 0 0 1.5px #bfdbfe}
  td.sel{cursor:pointer}
  /* inline editor never grows the cell: fills it exactly */
  .cellinput{box-sizing:border-box;width:100%;height:30px;min-width:0;font:inherit;font-size:12.5px;border:2px solid #2563eb;border-radius:4px;padding:2px 5px;outline:none;background:#fff;display:block}
  select.cellinput{padding:2px 3px}
  .empty{padding:20px 14px;text-align:center;color:#9ca3af}

  /* draft rows: top permanent + appended bottom ones */
  tr.draft td{background:#f2f6fd;border-bottom:1px solid #cdddf5}
  tr.draft.dtop td{border-bottom:2px solid #cdddf5}
  tr.draft .din{box-sizing:border-box;width:100%;height:30px;min-width:0;font:inherit;font-size:12.5px;border:1px solid #cfd9e8;border-radius:5px;padding:2px 6px;background:#fff}
  tr.draft select.din{padding:2px 3px}
  tr.draft .din:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 2px rgba(40,79,158,.15)}
  .addbtn2{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;background:var(--navy);color:#fff;font-weight:900;font-size:16px;border:0;cursor:pointer;line-height:1;padding:0}
  .addbtn2:hover{background:var(--navy-2)}
  .rmbtn{width:24px;height:24px;border-radius:7px;border:0;background:#fde8e8;color:#c0392b;font-weight:900;cursor:pointer;line-height:1}
  .rmbtn:hover{background:#f7c9c9}

  /* bottom drag strip to resize the table height */
  .vrz{height:12px;cursor:row-resize;background:linear-gradient(#fff,#eef2f8);border-top:1px solid #e7edf6;display:flex;align-items:center;justify-content:center}
  .vrz::after{content:'';width:40px;height:3px;border-radius:3px;background:#c2cddf}
  body.resizing{cursor:row-resize!important;user-select:none!important}

  /* back-to-top FAB (cloned from the tabbed grid) */
  .totop{position:fixed;right:24px;bottom:24px;width:42px;height:42px;border-radius:50%;background:var(--navy);color:#fff;border:0;cursor:pointer;box-shadow:0 6px 18px rgba(15,23,42,.28);display:none;align-items:center;justify-content:center;font-size:20px;line-height:1;z-index:60;transition:transform .15s ease,opacity .15s ease;opacity:0}
  .totop.show{display:inline-flex;opacity:1}
  .totop:hover{transform:translateY(-2px);background:var(--navy-2)}
  .totop svg{width:18px;height:18px}
  .muted{color:var(--tx-3)}

  /* description popup — ported from the frappe grid's note workspace, same blue/white */
  .pg-note-workspace{position:fixed;inset:0;z-index:2147482400;display:flex;align-items:flex-start;justify-content:center;padding:20px;background:rgba(15,35,75,.58);backdrop-filter:blur(4px)}
  /* expand affordance on long-text cells: click to type, arrow to open the popup */
  td.notecell{position:relative}
  .note-exp{position:absolute;right:3px;bottom:2px;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border:0;border-radius:5px;background:#eef4ff;color:var(--navy);cursor:pointer;padding:0;opacity:0;transition:opacity .12s}
  td.notecell:hover .note-exp,.note-wrap:hover .note-exp{opacity:1}
  .note-exp:hover{background:#dbeafe}
  .note-exp svg{width:12px;height:12px}
  .note-wrap{position:relative;display:block;width:100%}
  .note-wrap .note-exp{right:3px;bottom:5px}
  .pg-note-workspace-box{width:min(760px,calc(100vw - 32px));max-height:calc(100vh - 48px);display:flex;flex-direction:column;overflow:hidden;border:1px solid #cbd9f1;border-radius:18px;background:#fff;box-shadow:0 28px 80px rgba(15,35,75,.32)}
  .pg-note-workspace-head{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 22px;background:linear-gradient(135deg,#1e3f85,#284f9e);color:#fff}
  .pg-note-workspace-title{font-size:16px;font-weight:800;letter-spacing:.02em}
  .pg-note-workspace-sub{margin-top:3px;font-size:11.5px;color:rgba(255,255,255,.76)}
  .pg-note-workspace-head-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
  .pg-note-head-tool{height:32px;display:inline-flex;align-items:center;gap:6px;padding:0 11px;border:1px solid rgba(255,255,255,.34);border-radius:9px;background:rgba(255,255,255,.12);color:#fff;font:inherit;font-size:11.5px;font-weight:700;cursor:pointer}
  .pg-note-head-tool:hover,.pg-note-head-tool.has-content{background:#fff;color:#1e3f85}
  .pg-note-head-tool:disabled{opacity:.55;cursor:wait}
  .pg-note-workspace-close{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.32);border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:20px;cursor:pointer}
  .pg-note-workspace-body{padding:20px 22px;overflow:auto;background:#f7faff}
  .pg-note-workspace-label{display:block;margin-bottom:7px;color:#1e3f85;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}

function getToken(){
  const isJwt = s => typeof s==='string' && /^eyJ[\w-]+\.[\w-]+\.[\w-]+$/.test(s);
  const direct = localStorage.getItem('oe_access_token');
  if(isJwt(direct)) return direct;
  for(const store of [localStorage, sessionStorage]){
    for(let i=0;i<store.length;i++){ const v=store.getItem(store.key(i));
      if(isJwt(v)) return v;
      if(v && v[0]==='{'){ try{ const o=JSON.parse(v); const c=o.access_token||o.token||(o.state&&(o.state.access_token||o.state.token)); if(isJwt(c)) return c; }catch(e){} } }
  }
  return null;
}

  document.body.appendChild(modal);

  return Array.isArray(a)?a.filter(x=>typeof x==='string'&&x.trim()):[]; }catch(e){ return []; } };

async function api(path,opts={}){
  const r=await fetch(API+path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+TOKEN,...(opts.headers||{})}});
  if(r.status===401){ fail('Session expired — open the main app on this exact host, sign in, then reload.'); throw new Error('401'); }
  const body=await r.json().catch(()=>({}));
  if(!r.ok){ const d=body.detail; throw new Error(Array.isArray(d)?d.map(x=>x.msg).join('; '):(d||r.status)); }
  return body;
}

function cellHTML(c,r,i){switch(c.k){
  case 'num': return `<span class="rn">${i+1}</span>`;

  case 'location': return dash(r.site_location);
  case 'owner': return avatar(r.owner);
  case 'type': return tagv(r.log_type);

  case 'maps': return r.maps_url
    ? `<span class="maps-cell"><a class="maps-btn" href="${esc(r.maps_url)}" target="_blank" rel="noreferrer" data-mapurl="${esc(r.maps_url)}"><span class="pin">${SVG.pin}</span><span>Open in Maps</span></a><button class="map-copy" data-copy="${esc(r.maps_url)}" title="Copy link">${SVG.copy}</button></span>`

let ROWS=[], openOnly=false, activeTab=0;
const selectedRows=new Set();
let topDraft={}, bottomDrafts=[];   // persisted client-side entry state
let selected=new Set();             // selected log ids

function stats(){ const now=new Date();
  const m=ROWS.filter(r=>{const d=new Date(r.created_at);return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();}).length;
  $('k-total').textContent=ROWS.length; $('k-open').textContent=ROWS.filter(r=>r.status==='open').length;
  $('k-month').textContent=m; $('k-done').textContent=ROWS.filter(r=>r.status==='done').length; }
function buildHead(){ $('thead').innerHTML=COLS.map(c=>`<th data-tab="${c.tab??''}" class="${c.cls||''}" style="width:${c.w}px">${c.h}</th>`).join(''); }

function draftCell(c,dp,st,rowNumber){
  if(c.k==='num') return `<span class="rn">${rowNumber}</span>`;
  // Frappe's CRM Log draft rows show the actual creation value as
  // DD/MM/YYYY HH:MM instead of the relative placeholder "now".
  if(c.k==='when') return `<span class="dt">${esc(fmtDT(new Date()))}</span>`;
  if(c.k==='status') return `<span class="mt">open</span>`;
  if(c.k==='owner') return `<span class="mt">you</span>`;
  const id=`${dp}-${c.k}`, v=esc(st[c.k]||'');
  if(c.draft==='select'){
    if(c.k==='prefix') return `<select class="din" id="${id}" data-dp="${dp}" data-dk="prefix">${prefixOpts(st.prefix||'')}</select>`;
    const o=c.k==='type'?TYPES:CATEGORIES; const blank=c.k==='category'?'<option value=""></option>':''; return `<select class="din" id="${id}" data-dp="${dp}" data-dk="${c.k}">${blank}${selOpts(o,st[c.k]||(c.k==='type'?'inbound_call':''))}</select>`; }
  if(c.draft==='date') return `<input class="din" id="${id}" data-dp="${dp}" data-dk="${c.k}" type="date" value="${v}">`;
  if(c.draft==='tel'){ const iso=st.iso||DEFAULT_ISO, dial=st.dial||DEFAULT_DIAL;
    return `<span class="tel-wrap"><button type="button" class="tel-cc" data-dp="${dp}" title="Country code"><img src="${flagSrc(iso)}" alt=""><span class="cc">${esc(dial)}</span>${SVG.chev}</button>`
      + `<input class="din tel-num" id="${id}" data-dp="${dp}" data-dk="mobilenum" placeholder="70 123 456" value="${esc(st.mobilenum||'')}"></span>`; }
  if(c.draft==='text'){
    const ph={prefix:'Mr/Ms',first:'First',last:'Last',company:'Company',desc:'What was said…',location:'Location',mobile:'+961…',email:'Email',maps:'Maps URL',country:'Country',district:'District',city:'City',street:'Street',updates:'Updates',funotes:'Notes'}[c.k]||'';
    const type=c.k==='email'?' type="email" inputmode="email" autocomplete="email"':'';
    const inp=`<input class="din" id="${id}" data-dp="${dp}" data-dk="${c.k}" placeholder="${ph}" value="${v}"${type}${c.note?' data-note="1"':''}>`;
    if(c.note) return `<span class="note-wrap">${inp}<button type="button" class="note-exp" data-noteexp data-for="${id}" title="Open notes, files and drawing">${SVG.expand}</button></span>`;
    if(c.k==='email') return `<span class="draft-email">${inp}<button class="draft-compose" type="button" data-draft-compose="${id}" title="Compose email"${validEmail(st[c.k])&&st[c.k]?'':' hidden'}>${SVG.mail}</button></span>`;
    return inp;
  }
  return `<span class="mt">—</span>`;
}
function draftRowHTML(dp,st,isTop,rowNumber){
  const key=`draft:${dp}`, selected=selectedRows.has(key)?' row-selected':'';
  return `<tr class="draft selectable-row ${isTop?'dtop':''}${selected}" data-row-key="${key}">${COLS.map(c=>{
    const select=c.k==='num'?`data-select-row="${key}" title="Select this row" aria-label="Select row ${rowNumber}"`:'';
    return `<td data-tab="${c.tab??''}" class="${[c.cls||'',c.wide?'wide':''].join(' ').trim()}" ${select}>${draftCell(c,dp,st,rowNumber)}</td>`;
  }).join('')}</tr>`;
}

function dataRowHTML(r,i,rowNumber){ const key=`log:${r.id}`; return `<tr class="data selectable-row${selectedRows.has(key)?' row-selected':''}" data-row-key="${key}" data-file="${r.file_id}" data-log="${r.id}" data-i="${i}">${
  COLS.map(c=>{
    const ed=c.edit?`data-edit data-kind="${c.edit.kind}" data-target="${c.edit.target}" data-field="${c.edit.field}" data-val="${esc(c.edit.val(r))}"`:'';
    const cls=[c.cls||'',c.wide?'wide':'',c.note?'notecell':'',c.edit?(['status','type','category','prefix'].includes(c.edit.kind)?'sel':'ed'):''].join(' ').trim();
    const select=c.k==='num'?`data-select-row="${key}" title="Select this row" aria-label="Select row ${rowNumber}"`:'';
    const exp=c.note?`<button type="button" class="note-exp" data-noteexp title="Open notes, files and drawing">${SVG.expand}</button>`:'';
    return `<td data-tab="${c.tab??''}" data-k="${c.k}" class="${cls}" ${select} ${ed}>${c.k==='num'?`<span class="rn">${rowNumber}</span>`:cellHTML(c,r,i)}${exp}</td>`;
  }).join('')
}</tr>`; }

function visibleSelectableRows(){ return [...$('rows').querySelectorAll('tr.selectable-row')]; }
function refreshSelectionButton(){
  const rows=visibleSelectableRows(), all=rows.length>0&&rows.every(tr=>selectedRows.has(tr.dataset.rowKey));
  $('select-all').classList.toggle('on',all);
  $('select-all').setAttribute('aria-pressed',String(all));
  $('select-all-label').textContent=all?'Unselect All':'Select All';
}
function toggleRowSelection(tr,force){
  const id=tr.dataset.rowKey, on=force===undefined?!selectedRows.has(id):force;
  if(on) selectedRows.add(id); else selectedRows.delete(id);
  tr.classList.toggle('row-selected',on);
  refreshSelectionButton();
}

function render(){
  const q=$('q').value.trim().toLowerCase();
  let rows=openOnly?ROWS.filter(r=>r.status==='open'):ROWS;
  if(q) rows=rows.filter(r=>[r.contact_name,r.company_name,r.file_number,r.city,r.description,r.log_type,r.mobile,r.email,r.category].some(v=>String(v||'').toLowerCase().includes(q)));
  $('count').textContent=`· ${rows.length}`;
  let rowNumber=1;
  const body=[
    draftRowHTML('d',topDraft,true,rowNumber++),
    rows.length?rows.map((r,i)=>dataRowHTML(r,i,rowNumber++)).join(''):'',
    bottomDrafts.map((st,i)=>draftRowHTML('b'+i,st,false,rowNumber++)).join(''),
  ].join('');
  $('rows').innerHTML=body;
  refreshSelectionButton();
  refreshDeleteButton();
}

/* Delete the selected rows. Uses the shared selectedRows set (keys are `log:<id>`)
   so it stays in step with the select-all / row-number selection. */
function refreshDeleteButton(){
  const n=selectedRows.size, del=$('btn-del');
  if(del){ del.classList.toggle('on', n>0); const c=$('del-count'); if(c) c.textContent=n; }
}
async function deleteSelected(){
  const ids=[...selectedRows].map(k=>String(k).replace(/^log:/,''));
  if(!ids.length) return;
  if(!confirm(`Delete ${ids.length} log${ids.length>1?'s':''}? This cannot be undone.`)) return;
  try{
    for(const id of ids){ await api('/logs/'+id,{method:'DELETE'}); }
    selectedRows.clear();
    await load();
    refreshDeleteButton();
  }catch(e){ fail(e.message); }
}

/* ── draft interactions (delegated once) ── */
function stateFor(dp){ return dp==='d'?topDraft:bottomDrafts[+dp.slice(1)]; }
function draftInputs(dp){ return [...$('rows').querySelectorAll(`.din[data-dp="${dp}"]`)]; }
function addBottomRow(){
  // Keep the user's horizontal position on the row-number column. Focusing the
  // first editable field (Pre) made the browser scroll the grid sideways.
  const left=$('touter').scrollLeft;
  bottomDrafts.push({});
  render();
  $('touter').scrollLeft=left;
}
function removeBottomRow(dp){ bottomDrafts.splice(+dp.slice(1),1); render(); }
function draftMobile(st){
  const num=(st.mobilenum||'').trim();
  if(!num) return null;
  return `${st.dial||DEFAULT_DIAL} ${num}`.trim();
}
function draftPayload(st){
  const first=(st.first||'').trim(),last=(st.last||'').trim(),company=(st.company||'').trim();
  const isCo=!!company&&!first&&!last;
  const mob=draftMobile(st);
  const person=isCo?{is_company:true,company_name:company,mobile:mob,email:st.email||null}
    :{is_company:false,prefix:st.prefix||null,first_name:first||null,last_name:last||null,company_name:company||null,mobile:mob,email:st.email||null};
  const hasSite=st.country||st.district||st.city||st.street||st.maps||st.location;
  return {person,site:hasSite?{country:st.country||'Lebanon',district:st.district||null,city:st.city||null,street:st.street||null,maps_url:st.maps||null,site_location:st.location||null}:null,
    log_type:st.type||'inbound_call',category:st.category||null,description:st.desc||'',updates:st.updates||'',follow_up_date:st.followup||null,follow_up_notes:st.funotes||''};
}
const committing=new Set();
/* A row is saveable the moment it has an identity: a first name or a company.
   Everything else on the row is optional and can be filled in afterwards. */
function draftIsSaveable(st){ return !!((st.first||'').trim() || (st.company||'').trim() || (st.last||'').trim()); }
async function commitDraft(dp){
  const st=stateFor(dp); if(!st) return;
  if(!validEmail(st.email)){ showInvalidEmail($(dp+'-email')); return; }
  if(!draftIsSaveable(st)){ const el=$(dp+'-first'); if(el)el.focus(); return; }
  if(committing.has(dp)) return;
  committing.add(dp);
  try{
    const made=await api('/logs/',{method:'POST',body:JSON.stringify(draftPayload(st))});
    const logId=made&&made.log&&made.log.id;
    if(logId&&st.__drawing){ await api('/logs/'+logId,{method:'PATCH',body:JSON.stringify({drawing:st.__drawing})}); }
    if(logId&&st.__pendingFiles&&st.__pendingFiles.length){
      for(const f of st.__pendingFiles){
        const fd=new FormData(); fd.append('file',f,f.name);
        const r=await fetch(`${API}/logs/${logId}/attachments`,{method:'POST',headers:{Authorization:'Bearer '+TOKEN},body:fd});
        if(!r.ok){ const b=await r.json().catch(()=>({})); throw new Error(b.detail||`Could not upload ${f.name}`); }
      }
    }
    if(dp==='d') topDraft={}; else bottomDrafts.splice(+dp.slice(1),1);
    await load();
  }catch(e){ fail(e.message); }
  finally{ committing.delete(dp); }
}

/* Flush saveable drafts on the way out (refresh, navigation, or the embed being
   hidden). Uses keepalive so the request survives the page going away — a normal
   fetch would be cancelled mid-flight. Fire-and-forget: there is no page left to
   report an error to, and losing typed work is the worse failure. */
function flushDrafts(){
  if(!TOKEN) return;
  const list=[['d',topDraft]].concat(bottomDrafts.map((st,i)=>['b'+i,st]));
  for(const [dp,st] of list){
    if(!st||!draftIsSaveable(st)||committing.has(dp)) continue;
    committing.add(dp);
    // No UI left to correct a bad email — drop it rather than lose the whole row.
    if(!validEmail(st.email)) st.email='';
    try{
      fetch(API+'/logs/',{method:'POST',keepalive:true,
        headers:{'Content-Type':'application/json',Authorization:'Bearer '+TOKEN},
        body:JSON.stringify(draftPayload(st))});
    }catch(_){}
  }
  topDraft={}; bottomDrafts.length=0;
}
window.addEventListener('pagehide',flushDrafts);
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden') flushDrafts(); });
window.addEventListener('message',e=>{ if(e&&e.data&&e.data.type==='achi-flush') flushDrafts(); });

/* Auto-save: leaving a draft row saves it as soon as it has a name or company.
   Moving between fields inside the same row, opening the country picker, or
   opening the notes workspace are not "leaving" — those keep the row open. */
$('rows').addEventListener('focusout',e=>{
  const el=e.target;
  if(!(el.classList&&el.classList.contains('din'))) return;
  const tr=el.closest('tr.draft'), dp=el.dataset&&el.dataset.dp;
  if(!tr||!dp) return;
  setTimeout(()=>{
    const a=document.activeElement;
    if(a&&a.closest&&(a.closest('tr.draft')===tr||a.closest('.cc-drop')||a.closest('.pg-note-workspace'))) return;
    if(document.querySelector('.pg-note-workspace')) return;   // workspace open for this row
    const st=stateFor(dp);
    if(st&&draftIsSaveable(st)) commitDraft(dp);
  },140);
});
$('rows').addEventListener('input',e=>{ const el=e.target; if(!(el.dataset&&el.dataset.dp))return;
  const st=stateFor(el.dataset.dp); if(!st)return;
  if(el.dataset.dk==='prefix' && el.value===PREFIX_ADD){   // sentinel, never stored
    st.prefix=addPrefix()||''; const dp=el.dataset.dp; render();
    const s=document.getElementById(dp+'-prefix'); if(s) s.focus();
    return; }
  st[el.dataset.dk]=el.value;
  if(el.dataset.dk==='email'){const valid=validEmail(el.value);if(valid)el.classList.remove('email-invalid');const button=el.closest('.draft-email')?.querySelector('.draft-compose');if(button)button.hidden=!(el.value.trim()&&valid); }
});
$('rows').addEventListener('keydown',e=>{ const el=e.target; if(!(el.classList&&el.classList.contains('din')))return;
  if(e.key==='Enter'){ e.preventDefault(); if(el.dataset.dk==='email'&&!validEmail(el.value)){showInvalidEmail(el);return;} const dp=el.dataset.dp; const ins=draftInputs(dp); const i=ins.indexOf(el);
    if(i<ins.length-1){ ins[i+1].focus(); ins[i+1].scrollIntoView({inline:'center',block:'nearest'}); } else commitDraft(dp); } });
$('rows').addEventListener('focusout',e=>{const el=e.target;if(el&&el.dataset&&el.dataset.dk==='email'&&!validEmail(el.value))showInvalidEmail(el);});
$('add-row').addEventListener('click',addBottomRow);
$('btn-del').addEventListener('click',deleteSelected);
$('select-all').addEventListener('click',()=>{
  const rows=visibleSelectableRows(), all=rows.length>0&&rows.every(tr=>selectedRows.has(tr.dataset.rowKey));
  rows.forEach(tr=>toggleRowSelection(tr,!all));
  refreshSelectionButton(); refreshDeleteButton();
});
$('rows').addEventListener('click',e=>{ const ccb=e.target.closest('.tel-cc'); if(ccb){ openCc(ccb); return; }
  const num=e.target.closest('td[data-select-row]'); if(num){ toggleRowSelection(num.closest('tr.selectable-row')); refreshDeleteButton(); return; }
  const a=e.target.closest('[data-add]'); if(a){ addBottomRow(); return; }
  const email=e.target.closest('[data-compose-email]'); if(email){ openEmailCompose(email.dataset.composeEmail); return; }
  const draftEmail=e.target.closest('[data-draft-compose]'); if(draftEmail){const input=$(draftEmail.dataset.draftCompose);if(input&&validEmail(input.value)&&input.value.trim())openEmailCompose(input.value.trim());return;}
  const rm=e.target.closest('[data-rm]'); if(rm){ removeBottomRow(rm.getAttribute('data-rm')); return; }
  const ne=e.target.closest('.note-exp'); if(ne){
    const forId=ne.getAttribute('data-for');
    if(forId){ const inp=document.getElementById(forId); if(inp) openDraftNoteWorkspace(inp); return; }
    const ntd=ne.closest('td[data-k]');
    if(ntd){ const col=COLS.find(c=>c.k===ntd.dataset.k); if(col) openNoteWorkspace(ntd,col); }
    return; }
  const cp=e.target.closest('[data-copy]'); if(cp){ try{navigator.clipboard.writeText(cp.dataset.copy);}catch(_){} cp.classList.add('copied'); cp.innerHTML=SVG.check; setTimeout(()=>{cp.classList.remove('copied');cp.innerHTML=SVG.copy;},1000); return; }
  const numTd=e.target.closest('td.num'); if(numTd && numTd.closest('tr.data')){ toggleSelect(numTd.closest('tr.data').dataset.log); return; }
  const td=e.target.closest('td[data-edit]'); if(td && td.closest('tr.data')){ if(!e.target.closest('a,button')) openEditor(td); } });

/* ── country-code picker (real flag images; emoji flags don't render on Windows) ── */
let ccDrop=null, ccBtn=null;
function ensureCcDrop(){ if(ccDrop) return;
  ccDrop=document.createElement('div'); ccDrop.className='cc-drop';
  ccDrop.innerHTML=`<input class="cc-search" placeholder="Search country or code…"><div class="cc-list"></div>`;
  document.body.appendChild(ccDrop);
  ccDrop.querySelector('.cc-search').addEventListener('input',e=>renderCcList(e.target.value));
  ccDrop.addEventListener('mousedown',e=>{ const it=e.target.closest('.cc-item[data-iso]'); if(it){ e.preventDefault(); pickCc(it.dataset.iso,it.dataset.dial); } });
  document.addEventListener('mousedown',e=>{ if(ccDrop.classList.contains('vis') && !ccDrop.contains(e.target) && !e.target.closest('.tel-cc')) closeCc(); });
}
function renderCcList(q){ const t=(q||'').trim().toLowerCase();
  const rows=COUNTRIES.filter(c=>!t||c[1].toLowerCase().includes(t)||c[2].includes(t)||c[0]===t);
  ccDrop.querySelector('.cc-list').innerHTML = rows.length
    ? rows.map(c=>`<div class="cc-item" data-iso="${c[0]}" data-dial="${c[2]}"><img src="${flagSrc(c[0])}" alt=""><span class="cc-name">${esc(c[1])}</span><span class="cc-dial">${esc(c[2])}</span></div>`).join('')
    : `<div class="cc-item" style="cursor:default;opacity:.6">No match</div>`;
}
function openCc(btn){ ensureCcDrop(); ccBtn=btn;
  const s=ccDrop.querySelector('.cc-search'); s.value=''; renderCcList('');
  const r=btn.getBoundingClientRect();
  ccDrop.style.left=Math.max(8,Math.min(r.left,window.innerWidth-300))+'px';
  ccDrop.style.top=((r.bottom+290>window.innerHeight) ? Math.max(8,r.top-290) : r.bottom+4)+'px';
  ccDrop.classList.add('vis'); s.focus();
}
function closeCc(){ if(ccDrop) ccDrop.classList.remove('vis'); ccBtn=null; }
function pickCc(iso,dial){ if(!ccBtn) return;
  const dp=ccBtn.dataset.dp, st=stateFor(dp);
  if(st){ st.iso=iso; st.dial=dial; }
  const img=ccBtn.querySelector('img'); if(img) img.src=flagSrc(iso);

}

/* ── Maps hover preview (ported from the tabbed grid) ── */
let mapsPopup=null, mapsTimer=null;
function ensureMapsPopup(){ if(mapsPopup)return; mapsPopup=document.createElement('div'); mapsPopup.className='maps-popup';
  mapsPopup.addEventListener('mouseenter',()=>clearTimeout(mapsTimer)); mapsPopup.addEventListener('mouseleave',()=>{mapsTimer=setTimeout(hideMapsPopup,150);}); document.body.appendChild(mapsPopup); }
function hideMapsPopup(){ if(mapsPopup) mapsPopup.classList.remove('vis'); }
function mapsCoords(url){ const pats=[/@(-?\d+\.?\d*),\+?(-?\d+\.?\d*)/,/\/maps\/search\/(-?\d+\.?\d*),\+?(-?\d+\.?\d*)/,/[?&]q=(-?\d+\.?\d*),\+?(-?\d+\.?\d*)/,/[?&]ll=(-?\d+\.?\d*),\+?(-?\d+\.?\d*)/];
  for(const p of pats){ const m=String(url||'').match(p); if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])}; } return null; }
function positionPopup(pop,anchor){ const r=anchor.getBoundingClientRect(); const pw=248,ph=190; let left=r.left, top=r.bottom+6;
  if(left+pw>window.innerWidth-8) left=window.innerWidth-pw-8; if(top+ph>window.innerHeight-8) top=r.top-ph-6;
  pop.style.left=Math.max(8,left)+'px'; pop.style.top=Math.max(8,top)+'px'; }
/* OSM embed, ported from erp_next_custom tabbed_grid.js (_renderMapsEmbed).
 * Replaces the hand-stitched tile grid: openstreetmap.org/export/embed.html
 * renders the map itself, so the preview pans and zooms and OSM draws the
 * marker — no manual Mercator projection and no pin overlay to keep centred.
 * d is the bbox half-span; upstream uses .004 for the hover card and .01 for
 * the expanded modal. */
const mapEmbed=(lat,lng,d)=>`https://www.openstreetmap.org/export/embed.html?bbox=${lng-d},${lat-d},${lng+d},${lat+d}&layer=mapnik&marker=${lat},${lng}`;
function showMapsPopup(anchor,url){ ensureMapsPopup(); const c=mapsCoords(url);
  if(c){ mapsPopup.innerHTML=`<div class="maps-popup-inner">`
      +`<iframe src="${esc(mapEmbed(c.lat,c.lng,0.004))}" loading="lazy" referrerpolicy="no-referrer"></iframe>`
      +`<button type="button" class="popup-expand" data-mapexp data-lat="${c.lat}" data-lng="${c.lng}" title="Expand map">${SVG.expand}</button>`
      +`</div><div class="maps-popup-url">${esc(url)}</div>`; }
  else { mapsPopup.innerHTML=`<div class="maps-popup-fallback">${esc(url)}</div>`; }
  mapsPopup.classList.add('vis'); positionPopup(mapsPopup,anchor); }
/* Expand modal (upstream _openExpandModal, type "maps"): same embed at a wider
   bbox. Reuses the note workspace's overlay so there is one modal style. */
function openMapModal(lat,lng){
  document.querySelector('.pg-note-workspace')?.remove();
  hideMapsPopup();
  const ov=document.createElement('div');
  ov.className='pg-note-workspace'; ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
  ov.innerHTML=`<div class="pg-note-workspace-box" style="width:min(760px,calc(100vw - 32px))">
    <div class="pg-note-workspace-head"><div class="pg-note-workspace-title">Map Preview</div>
      <div class="pg-note-workspace-head-actions"><button type="button" class="pg-note-workspace-close" data-mapclose aria-label="Close">&times;</button></div></div>
    <iframe src="${esc(mapEmbed(lat,lng,0.01))}" loading="lazy" referrerpolicy="no-referrer" style="width:100%;height:min(60vh,460px);border:none;display:block"></iframe>
  </div>`;
  const close=()=>{ ov.remove(); document.removeEventListener('keydown',onKey,true); };
  const onKey=e=>{ if(e.key==='Escape'){ e.stopPropagation(); close(); } };
  ov.addEventListener('mousedown',e=>{ if(e.target===ov||e.target.closest('[data-mapclose]')) close(); });
  document.addEventListener('keydown',onKey,true);
  document.body.appendChild(ov);
}
$('rows').addEventListener('mouseover',e=>{ const b=e.target.closest('.maps-btn'); if(b){ clearTimeout(mapsTimer); showMapsPopup(b,b.dataset.mapurl); } });
$('rows').addEventListener('mouseout',e=>{ const b=e.target.closest('.maps-btn'); if(b){ mapsTimer=setTimeout(hideMapsPopup,150); } });
// the popup is appended to document.body, so the grid's delegation never sees it
document.addEventListener('click',e=>{ const x=e.target.closest&&e.target.closest('[data-mapexp]');
  if(x){ e.preventDefault(); openMapModal(parseFloat(x.dataset.lat),parseFloat(x.dataset.lng)); } });

/* ── shortcut: Shift+R adds a row ──────────────────────────────────────────
 * Ported from erp_next_custom/public/js/core/grid/tabbed_grid.js
 * (_installAddRowShortcut). Same contract: one document-level capture-phase
 * listener that CLICKS the visible "+" button rather than calling addBottomRow()
 * directly, so the shortcut and the mouse share one code path. Accepts the
 * physical KeyR as well as the produced "r"/"R" so it survives non-QWERTY layouts.
 */
function isTypingTarget(t){
  if(!t) return false;
  if(t.isContentEditable) return true;
  const tag=(t.tagName||'').toUpperCase();
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return true;
  return !!(t.closest && t.closest('input,textarea,select,[contenteditable]'));
}
document.addEventListener('keydown',e=>{
  if(!e.shiftKey||e.ctrlKey||e.metaKey||e.altKey) return;                 // plain Shift+R only
  if(e.code!=='KeyR' && String(e.key||'').toLowerCase()!=='r') return;    // layout-proof
  if(e.repeat) return;                                                    // ignore held-key repeat
  if(isTypingTarget(e.target)) return;                                    // not while typing a draft cell
  if($('rows').querySelector('.cellinput')) return;                       // not while an inline editor is open
  const btn=$('add-row');
  if(!btn) return;
  e.preventDefault(); e.stopPropagation();
  btn.click();
},true);
/* ── inline editor for existing rows (single-cell, no re-render, Enter advances) ── */
function nextEditableInRow(td){ let n=td.nextElementSibling; while(n){ if(n.hasAttribute('data-edit')) return n; n=n.nextElementSibling; } return null; }
function refreshCell(td){ const tr=td.closest('tr'); const r=ROWS.find(x=>x.id===tr.dataset.log); const c=COLS.find(x=>x.k===td.dataset.k); if(r&&c){ td.innerHTML=cellHTML(c,r,+tr.dataset.i); } }
function openEditor(td){
  if(td.querySelector('input,select')) return;
  const col=COLS.find(c=>c.k===td.dataset.k);
  // long-text cells edit inline like any other; the ⤢ arrow opens the full workspace
  const kind=td.dataset.kind, val=td.dataset.val||'', field=td.dataset.field, target=td.dataset.target;
  const tr=td.closest('tr'), logId=tr.dataset.log, fileId=tr.dataset.file;
  let el;
  if(kind==='status'||kind==='type'||kind==='category'||kind==='prefix'){ el=document.createElement('select'); el.className='cellinput';
    el.innerHTML=kind==='prefix'?prefixOpts(val)
      :(kind==='category'?'<option value=""></option>':'')+selOpts(kind==='status'?STATUSES:kind==='type'?TYPES:CATEGORIES,val); }
  else { el=document.createElement('input'); el.className='cellinput'; el.type=field==='email'?'email':kind==='date'?'date':'text'; el.value=val; }
  td.innerHTML=''; td.appendChild(el); el.focus();
  if(el.tagName==='SELECT'){ try{ el.showPicker(); }catch(e){} }   // open on one click
  else if(el.select){ el.select(); }
  let ran=false;
  const finish=async(save,advance)=>{ if(ran)return;
    // window.prompt() blurs the select, which would otherwise commit the "＋ Add
    // new…" sentinel as a real prefix. Refuse it and leave the editor open.
    if(el.value===PREFIX_ADD) return;
    const nv=el.value;
    if(save&&field==='email'&&!validEmail(nv)){showInvalidEmail(el);return;}
    ran=true;
    if(save && nv!==val){ try{
      if(target==='file'){ await api('/files/'+fileId,{method:'PATCH',body:JSON.stringify({[field]:nv||null})}); }
      else if(target==='contact'){ await api('/files/'+fileId+'/contact',{method:'PATCH',body:JSON.stringify({[field]:nv||null})}); }
      else { await api('/logs/'+logId,{method:'PATCH',body:JSON.stringify({[field]:nv||null})}); }
      // mirror into the local row (contact/file fields shared across a file's logs)
      ROWS.forEach(r=>{ if((target==='log'&&r.id===logId)||(target!=='log'&&r.file_id===fileId)) r[field]=nv; });
      td.dataset.val=nv; clearErr(); stats();
    }catch(e){ fail(e.message); } }
    refreshCell(td);
    if(advance){ const nx=nextEditableInRow(td); if(nx){ nx.scrollIntoView({inline:'center',block:'nearest'}); openEditor(nx); } }
  };
  el.addEventListener('blur',()=>finish(true,false));
  el.addEventListener('keydown',ev=>{ if(ev.key==='Enter'){ev.preventDefault();finish(true,true);} else if(ev.key==='Escape'){ran=true;refreshCell(td);} });
  if(el.tagName==='SELECT') el.addEventListener('change',()=>{
    if(kind==='prefix' && el.value===PREFIX_ADD){
      const v=addPrefix(); el.innerHTML=prefixOpts(v||val); el.value=v||val; el.focus(); return; }
    finish(true,false); });
}

/* ── description popup: notes + files + drawing ──────────────────────────
   Ported from the frappe grid's note workspace so the two look and behave the
   same. Simpler here in one way: this only ever opens on a saved row, so there
   is none of frappe's "persist the draft first" dance — the log id already
   exists by the time a cell is clickable. */
function openNoteWorkspace(td,col){
  const tr=td.closest('tr'), logId=tr.dataset.log, field=td.dataset.field;
  const row=ROWS.find(r=>r.id===logId)||{};
  const oldVal=td.dataset.val||'';
  const pendingFiles=[];
  let attached=[], saving=false;

  document.querySelector('.pg-note-workspace')?.remove();

  const ov=document.createElement('div');
  ov.className='pg-note-workspace'; ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
  ov.innerHTML=`
    <div class="pg-note-workspace-box">
      <div class="pg-note-workspace-head">
        <div><div class="pg-note-workspace-title">${esc(col.h)}</div><div class="pg-note-workspace-sub">Notes, documents, PDFs, images, and drawing</div></div>
        <div class="pg-note-workspace-head-actions">
          <button type="button" class="pg-note-head-tool pg-note-upload"><span>&#128206;</span> Files</button>
          <button type="button" class="pg-note-head-tool pg-note-drawing"><span>&#9998;</span> Drawing</button>
          <button type="button" class="pg-note-workspace-close" aria-label="Close">&times;</button>
        </div>
      </div>
      <div class="pg-note-workspace-body">
        <label class="pg-note-workspace-label">Notes</label>
        <textarea class="pg-note-workspace-text" placeholder="Add your notes here…">${esc(oldVal)}</textarea>
        <div class="pg-note-files"></div>
        <div class="pg-note-workspace-status"></div>
      </div>
      <div class="pg-note-workspace-foot">
        <div class="pg-note-workspace-hint">Enter saves and continues &middot; Shift+Enter adds a line</div>
        <div class="pg-note-workspace-actions"><button type="button" class="pg-note-cancel">Cancel</button><button type="button" class="pg-note-save">Save &amp; Continue</button></div>
      </div>
    </div>`;
  document.body.appendChild(ov);

  const q=s=>ov.querySelector(s);
  const ta=q('.pg-note-workspace-text'), filesEl=q('.pg-note-files'), statusEl=q('.pg-note-workspace-status'),
        saveBtn=q('.pg-note-save'), drawBtn=q('.pg-note-drawing');
  const close=()=>ov.remove();

  function renderFiles(){
    const a=attached.map(f=>`<div class="pg-note-file"><a href="#" data-open="${esc(f.id)}">${esc(f.filename)}</a><span class="pg-note-file-right"><span class="pg-note-file-pending">${fmtSize(f.size_bytes)}</span><button type="button" class="pg-note-file-del" data-del="${esc(f.id)}" title="Remove">&times;</button></span></div>`);
    const p=pendingFiles.map((f,i)=>`<div class="pg-note-file"><span>${esc(f.name)}</span><span class="pg-note-file-right"><span class="pg-note-file-pending">Ready to upload</span><button type="button" class="pg-note-file-del" data-pending="${i}" title="Remove">&times;</button></span></div>`);
    filesEl.innerHTML=a.concat(p).join('')||'<div class="pg-note-file"><span>No files attached yet</span></div>';
  }
  const fmtSize=n=>n>=1048576?(n/1048576).toFixed(1)+' MB':n>=1024?Math.round(n/1024)+' KB':n+' B';

  /* The API is bearer-only — there is no cookie session, so a plain href would
     401. Fetch the bytes with the token and hand the browser a blob instead. */
  async function openAttachment(id){
    const r=await fetch(`${API}/attachments/${id}/download`,{headers:{Authorization:'Bearer '+TOKEN}});
    if(!r.ok) throw new Error('Could not open the file');
    const url=URL.createObjectURL(await r.blob());
    window.open(url,'_blank','noreferrer');
    setTimeout(()=>URL.revokeObjectURL(url),60000);   // the new tab needs it to still be alive
  }

  async function loadFiles(){
    try{ attached=await api(`/logs/${logId}/attachments`); if(ov.isConnected) renderFiles(); }
    catch(e){ statusEl.textContent=e.message; }
  }

  async function persistNote(){
    const nv=ta.value;
    if(nv===td.dataset.val) return nv;
    await api('/logs/'+logId,{method:'PATCH',body:JSON.stringify({[field]:nv})});
    td.dataset.val=nv;
    ROWS.forEach(r=>{ if(r.id===logId) r[field]=nv; });
    return nv;
  }

  async function saveAndContinue(){
    if(saving) return;
    saving=true; saveBtn.disabled=true; drawBtn.disabled=true; statusEl.textContent='Saving…';
    try{
      await persistNote();
      if(pendingFiles.length){
        statusEl.textContent=`Uploading ${pendingFiles.length} file${pendingFiles.length===1?'':'s'}…`;
        for(const f of pendingFiles){
          const fd=new FormData(); fd.append('file',f,f.name);
          const r=await fetch(`${API}/logs/${logId}/attachments`,{method:'POST',headers:{Authorization:'Bearer '+TOKEN},body:fd});
          if(!r.ok){ const b=await r.json().catch(()=>({})); throw new Error(b.detail||`Could not upload ${f.name}`); }
        }
        const row=ROWS.find(r=>r.id===logId);
        if(row) row.attachment_count=(row.attachment_count||0)+pendingFiles.length;
        pendingFiles.length=0;
      }
      clearErr(); close(); refreshCell(td);
      const nx=nextEditableInRow(td);
      if(nx){ nx.scrollIntoView({inline:'center',block:'nearest'}); openEditor(nx); }
    }catch(e){
      saving=false; saveBtn.disabled=false; drawBtn.disabled=false;
      statusEl.textContent=e.message||'Save failed. Please try again.';
    }
  }

  q('.pg-note-upload').addEventListener('click',()=>{
    const inp=document.createElement('input');
    inp.type='file'; inp.multiple=true; inp.accept='.pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,image/*';
    inp.addEventListener('change',()=>{ pendingFiles.push(...Array.from(inp.files||[])); renderFiles(); },{once:true});
    inp.click();
  });

  filesEl.addEventListener('click',async e=>{
    const link=e.target.closest('[data-open]');
    if(link){ e.preventDefault();
      try{ await openAttachment(link.dataset.open); }catch(err){ statusEl.textContent=err.message; }
      return; }
    const btn=e.target.closest('[data-del],[data-pending]'); if(!btn) return;
    if(btn.dataset.pending!==undefined){ pendingFiles.splice(+btn.dataset.pending,1); renderFiles(); return; }
    const id=btn.dataset.del; btn.disabled=true;
    try{
      const r=await fetch(`${API}/attachments/${id}`,{method:'DELETE',headers:{Authorization:'Bearer '+TOKEN}});
      if(!r.ok) throw new Error('Could not remove the file');
      attached=attached.filter(f=>f.id!==id); renderFiles();
      const row=ROWS.find(x=>x.id===logId); if(row) row.attachment_count=attached.length;
    }catch(err){ btn.disabled=false; statusEl.textContent=err.message; }
  });

  drawBtn.addEventListener('click',async()=>{
    if(saving) return;
    if(typeof achi_drawing==='undefined'){ statusEl.textContent='Drawing tool is unavailable.'; return; }
    saving=true; drawBtn.disabled=true; saveBtn.disabled=true; statusEl.textContent='Preparing drawing…';
    let initial='';
    try{ await persistNote(); initial=(await api(`/logs/${logId}/drawing`)).drawing||''; }
    catch(e){ statusEl.textContent=e.message||'Could not open the drawing.'; drawBtn.disabled=false; saveBtn.disabled=false; saving=false; return; }
    ov.style.display='none';   // hidden, not destroyed: the notes come back untouched
    achi_drawing.open({
      title:`Drawing — ${col.h}`,
      initial,
      async onSave(json,hasShapes){
        await api('/logs/'+logId,{method:'PATCH',body:JSON.stringify({drawing:json})});
        const row=ROWS.find(r=>r.id===logId); if(row) row.has_drawing=hasShapes?1:0;
        drawBtn.classList.toggle('has-content',!!hasShapes);
        statusEl.textContent=hasShapes?'Drawing saved.':'Drawing cleared.';
      },
      onClose(){
        if(!ov.isConnected) return;
        ov.style.display='flex'; drawBtn.disabled=false; saveBtn.disabled=false; saving=false;
        requestAnimationFrame(()=>ta.focus());
      },
    });
  });

  q('.pg-note-workspace-close').addEventListener('click',close);
  q('.pg-note-cancel').addEventListener('click',close);
  ov.addEventListener('mousedown',e=>{ if(e.target===ov) close(); });
  ta.addEventListener('keydown',e=>{ e.stopPropagation();
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); saveAndContinue(); } });
  ov.addEventListener('keydown',e=>{ if(e.key==='Escape'){ e.stopPropagation(); close(); } });
  saveBtn.addEventListener('click',saveAndContinue);

  drawBtn.classList.toggle('has-content',!!row.has_drawing);
  renderFiles(); loadFiles();
  requestAnimationFrame(()=>{ ta.focus(); ta.setSelectionRange(ta.value.length,ta.value.length); });
}

/* The highlighted entry row is not in the database yet. Frappe still opens its
   note workspace there, so keep files and drawing on the draft state and flush
   them immediately after POST /logs/ gives the row a real log id. */
function openDraftNoteWorkspace(input){
  const dp=input.dataset.dp, key=input.dataset.dk, st=stateFor(dp); if(!st) return;
  const col=COLS.find(c=>c.k===key)||{h:'Notes'};
  st.__pendingFiles=st.__pendingFiles||[];
  document.querySelector('.pg-note-workspace')?.remove();
  const ov=document.createElement('div'); ov.className='pg-note-workspace'; ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
  ov.innerHTML=`<div class="pg-note-workspace-box">
    <div class="pg-note-workspace-head"><div><div class="pg-note-workspace-title">${esc(col.h)}</div><div class="pg-note-workspace-sub">Notes, documents, PDFs, images, and drawing</div></div><div class="pg-note-workspace-head-actions"><button type="button" class="pg-note-head-tool pg-note-upload"><span>&#128206;</span> Files</button><button type="button" class="pg-note-head-tool pg-note-drawing"><span>&#9998;</span> Drawing</button><button type="button" class="pg-note-workspace-close" aria-label="Close">&times;</button></div></div>
    <div class="pg-note-workspace-body"><label class="pg-note-workspace-label">Notes</label><textarea class="pg-note-workspace-text" placeholder="Add your notes here…">${esc(st[key]||'')}</textarea><div class="pg-note-files"></div><div class="pg-note-workspace-status">Files and drawing will upload when this row is saved.</div></div>
    <div class="pg-note-workspace-foot"><div class="pg-note-workspace-hint">Enter saves and continues &middot; Shift+Enter adds a line</div><div class="pg-note-workspace-actions"><button type="button" class="pg-note-cancel">Cancel</button><button type="button" class="pg-note-save">Save &amp; Continue</button></div></div>
  </div>`;
  document.body.appendChild(ov);
  const q=s=>ov.querySelector(s), ta=q('.pg-note-workspace-text'), files=q('.pg-note-files'), draw=q('.pg-note-drawing');
  const renderFiles=()=>{ files.innerHTML=st.__pendingFiles.map((f,i)=>`<div class="pg-note-file"><span>${esc(f.name)}</span><span class="pg-note-file-right"><span class="pg-note-file-pending">Ready to upload</span><button type="button" class="pg-note-file-del" data-pending="${i}" title="Remove">&times;</button></span></div>`).join('')||'<div class="pg-note-file"><span>No files attached yet</span></div>'; };
  const close=()=>ov.remove();
  const save=()=>{ st[key]=ta.value; input.value=ta.value; close(); const ins=draftInputs(dp), i=ins.indexOf(input); if(i>=0&&ins[i+1]) ins[i+1].focus(); };
  q('.pg-note-upload').onclick=()=>{ const pick=document.createElement('input'); pick.type='file'; pick.multiple=true; pick.accept='.pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,image/*'; pick.onchange=()=>{ st.__pendingFiles.push(...Array.from(pick.files||[])); renderFiles(); }; pick.click(); };
  files.onclick=e=>{ const b=e.target.closest('[data-pending]'); if(b){ st.__pendingFiles.splice(+b.dataset.pending,1); renderFiles(); } };
  draw.onclick=()=>{ if(typeof achi_drawing==='undefined') return; ov.style.display='none'; achi_drawing.open({title:`Drawing — ${col.h}`,initial:st.__drawing||'',onSave(json){st.__drawing=json;draw.classList.add('has-content');},onClose(){if(ov.isConnected){ov.style.display='flex';requestAnimationFrame(()=>ta.focus());}}}); };
  q('.pg-note-workspace-close').onclick=close; q('.pg-note-cancel').onclick=close; q('.pg-note-save').onclick=save;
  ov.onmousedown=e=>{if(e.target===ov)close();}; ta.onkeydown=e=>{e.stopPropagation();if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();save();}};
  draw.classList.toggle('has-content',!!st.__drawing); renderFiles(); requestAnimationFrame(()=>ta.focus());
}

async function load(){ try{ ROWS=await api('/logs/'); stats(); render(); }catch(e){ fail(e.message); } }

/* tabs = scroll positions */
const tabsEl=$('tabs'), ind=$('ind'), outer=$('touter');
function moveInd(b){ ind.style.left=b.offsetLeft+'px'; ind.style.width=b.offsetWidth+'px'; }
function firstThForTab(n){ return $('thead').querySelector(`th[data-tab="${n}"]`); }
function maxHorizontalScroll(){ return Math.max(0,outer.scrollWidth-outer.clientWidth); }
function scrollToTab(n){ const th=firstThForTab(n); if(th) outer.scrollTo({left:n===0?0:n===3?maxHorizontalScroll():th.offsetLeft-8,behavior:'smooth'}); setActivePill(n); }
function setActivePill(n){ activeTab=n; tabsEl.querySelectorAll('.pill-tab').forEach(b=>{const on=+b.dataset.tab===n;b.classList.toggle('on',on);if(on)moveInd(b);}); }
function tabFromScroll(){ const max=maxHorizontalScroll(); let best=0; if(max>0&&outer.scrollLeft>=max-2) best=3; else{const x=outer.scrollLeft+60;[0,1,2,3].forEach(n=>{const th=firstThForTab(n);if(th&&th.offsetLeft<=x)best=n;});} if(best!==activeTab)setActivePill(best); }
tabsEl.querySelectorAll('.pill-tab').forEach(b=>b.onclick=()=>scrollToTab(+b.dataset.tab));
let sraf=0; outer.addEventListener('scroll',()=>{ $('totop').classList.toggle('show',outer.scrollTop>200); if(sraf)return; sraf=requestAnimationFrame(()=>{sraf=0;tabFromScroll();}); });
$('totop').onclick=()=>outer.scrollTo({top:0,behavior:'smooth'});
window.addEventListener('load',()=>moveInd(tabsEl.querySelector('.pill-tab.on')));
$('k-open-card').onclick=()=>{ openOnly=!openOnly; $('k-open-card').classList.toggle('on',openOnly); render(); };
$('q').oninput=render;

/* bottom drag strip resizes table height (persisted) */
(function(){
  const saved=+localStorage.getItem('achi_bh'); if(saved>160) outer.style.setProperty('--bh',saved+'px');
  $('vrz').addEventListener('pointerdown',e=>{
    const start={y:e.clientY,h:outer.getBoundingClientRect().height}; document.body.classList.add('resizing');
    const mv=ev=>{ const h=Math.max(180,Math.min(1400,start.h+(ev.clientY-start.y))); outer.style.setProperty('--bh',h+'px'); };
    const up=()=>{ window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up); document.body.classList.remove('resizing');
      localStorage.setItem('achi_bh',Math.round(outer.getBoundingClientRect().height)); };
    window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up);
  });
})();

/* boot */
$('totop').innerHTML=SVG.up;
$('btn-del').innerHTML=SVG.trash+'<span>Delete</span> <span class="tb-cnt" id="del-count">0</span>';
buildHead(); setActivePill(0); render();
if(!TOKEN) fail('Not signed in on this host. Open the main app at THIS address (same localhost/IP), sign in, then reload.');
else { load(); }
</script>
