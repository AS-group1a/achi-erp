<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Call Log · Achi Scaffolding ERP</title>
<style>
  :root{
    --navy:#284F9E; --navy-d:#1F3F80; --navy-2:#305FB8; --accent:#3D6BC4; --light:#E3EDFB;
    --bd:#dfe4ec; --hair:#eef1f6; --tx:#1d1d1f; --tx-2:#5b5e66; --tx-3:#8a8f98;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:var(--tx);background:#f5f5f7}
  header{background:var(--navy);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px}
  header h1{font-size:16px;font-weight:600}
  header .sp{flex:1}
  header .who{font-size:12px;opacity:.75}
  main{margin:0;padding:16px 18px 40px}
  .err{background:#fde8e8;color:#ba0517;border:1px solid #f5a0a0;padding:10px 14px;border-radius:8px;margin-bottom:12px;display:none}
  .feedback{position:fixed;inset:0;z-index:2147483000;display:flex;align-items:flex-start;justify-content:center;padding:72px 20px 20px;background:rgba(15,35,75,.24);backdrop-filter:blur(2px)}
  .feedback-box{width:min(430px,calc(100vw - 32px));overflow:hidden;border:1px solid #d8e3f3;border-top:4px solid var(--navy);border-radius:12px;background:#fff;box-shadow:0 24px 64px rgba(15,23,42,.18),0 4px 14px rgba(15,23,42,.08)}
  .feedback-head{padding:14px 20px;border-bottom:1px solid #dce6f5;background:linear-gradient(135deg,#edf4ff 0%,#f7faff 58%,#fff 100%);color:#1e3f85;font-size:16px;font-weight:800}
  .feedback-body{padding:20px;color:#334155;font-size:13.5px;line-height:1.65}
  .feedback-foot{display:flex;justify-content:flex-end;padding:12px 20px;border-top:1px solid #eef2f7;background:#f8fafc}
  .feedback-ok{min-width:72px;height:36px;border:0;border-radius:8px;background:linear-gradient(135deg,#1e3f85,#284f9e);color:#fff;font:inherit;font-size:12px;font-weight:800;cursor:pointer}
  .email-invalid{border-color:#284f9e!important;box-shadow:0 0 0 3px rgba(40,79,158,.16)!important}
  .email-btn{display:inline-flex;align-items:center;gap:6px;border:0;background:transparent;color:var(--navy);font:inherit;font-size:12.5px;cursor:pointer;padding:3px 0;text-decoration:none}
  .email-btn:hover{text-decoration:underline}
  .email-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .draft-email{display:flex;align-items:center;gap:5px;width:100%}
  .draft-email .din{min-width:0;flex:1}
  .draft-compose{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;flex:0 0 28px;border:1.5px solid #bfdbfe;border-radius:8px;background:#eff6ff;color:var(--navy);cursor:pointer;padding:0}
  .draft-compose:hover{background:#dbeafe}
  .draft-compose[hidden]{display:none}
  .draft-compose svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .compose{position:fixed;right:28px;bottom:0;z-index:2147482300;width:min(480px,calc(100vw - 24px));overflow:hidden;border:1.5px solid #cbd9f1;border-bottom:0;border-radius:12px 12px 0 0;background:#fff;box-shadow:0 -4px 32px rgba(0,0,0,.16);animation:compose-in .18s cubic-bezier(.2,0,.2,1) both}
  @keyframes compose-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .compose-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(135deg,#1e3f85,#284f9e);color:#fff}
  .compose-title{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;letter-spacing:.02em}
  .compose-title svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .compose-close{width:28px;height:28px;border:0;border-radius:8px;background:rgba(255,255,255,.18);color:#fff;font-size:19px;line-height:1;cursor:pointer}
  .compose-close:hover{background:rgba(255,255,255,.32)}
  .compose-row{display:flex;align-items:center;min-height:44px;padding:0 20px;border-bottom:1px solid #f0f0f5}
  .compose-label{width:64px;flex-shrink:0;color:#9ca3af;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  .compose-recipient{display:inline-flex;align-items:center;padding:5px 10px;border:1.5px solid #bfdbfe;border-radius:8px;background:#eff6ff;color:#1e40af;font-size:12px;font-weight:500}
  .compose-subject{flex:1;border:0;outline:0;background:transparent;color:#111827;font:inherit;font-size:13px}
  .compose-subject::placeholder,.compose-body::placeholder{color:#d1d5db}
  .compose-body{display:block;width:100%;min-height:210px;padding:16px 20px;border:0;outline:0;resize:none;color:#374151;font:inherit;font-size:13px;line-height:1.7}
  .compose-foot{display:flex;align-items:center;gap:8px;padding:12px 16px;border-top:1.5px solid #e8e8f0;background:#f6f9fe}
  .compose-send{padding:8px 22px;border:0;border-radius:8px;background:linear-gradient(135deg,#1e3f85,#284f9e);color:#fff;font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;box-shadow:0 7px 18px rgba(30,63,133,.22)}
  .compose-mailto{padding:8px 14px;border:1.5px solid #e0e0ea;border-radius:8px;background:#fff;color:#6b7280;font:inherit;font-size:12px;font-weight:600;cursor:pointer}
  .compose-mailto:hover{border-color:#1e3a8a;color:#1e3a8a;background:#eff6ff}

  .kpis{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap}
  .kpi{flex:1 1 180px;border-radius:12px;padding:15px 18px;color:#fff;transition:transform .15s ease}
  .kpi:hover{transform:translateY(-2px)}
  .kpi.btn{cursor:pointer}
  .kpi .n{font-size:28px;font-weight:900;line-height:1.05}
  .kpi .l{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
  .kpi .s{font-size:11px;opacity:.82}
  .k1{background:#0176d3}.k2{background:#032d60}.k3{background:#014486}.k4{background:#0e7490}
  .kpi.on{outline:3px solid rgba(255,255,255,.55);outline-offset:-3px}

  .shell{background:#fff;border:1px solid var(--bd);border-radius:12px;box-shadow:0 4px 20px rgba(40,79,158,.08);overflow:hidden}
  .nav{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;gap:12px;background:var(--navy);padding:11px 16px}
  .nav-actions{display:flex;align-items:center;gap:8px;justify-self:start}
  .nav-right{display:flex;align-items:center;gap:10px;justify-self:end;min-width:0}
  .pt{position:relative;display:inline-flex;justify-self:center;background:rgba(0,0,0,.2);border-radius:8px;padding:4px}
  .pt-ind{position:absolute;top:4px;bottom:4px;background:#fff;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.22);transition:left .18s cubic-bezier(.2,0,.2,1),width .18s cubic-bezier(.2,0,.2,1)}
  .pill-tab{position:relative;z-index:1;border:0;background:transparent;padding:7px 15px;font-size:12.5px;font-weight:600;color:rgba(255,255,255,.58);cursor:pointer;white-space:nowrap;font-family:inherit}
  .pill-tab:hover{color:rgba(255,255,255,.88)}
  .pill-tab.on{color:var(--navy);font-weight:800}
  .search{height:32px;width:200px;border-radius:8px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.12);color:#fff;font:inherit;font-size:12.5px;padding:0 12px;outline:none}
  .search::placeholder{color:rgba(255,255,255,.42)}
  .tb-add{display:inline-flex;align-items:center;gap:7px;padding:8px 15px;border:0;border-radius:8px;background:#fff;color:var(--navy);font:inherit;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;box-shadow:0 3px 12px rgba(0,0,0,.22);transition:transform .15s,box-shadow .15s}
  .tb-add:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(0,0,0,.28)}
  .tb-add-plus{font-size:17px;line-height:1}
  /* delete selected */
  .tb-del{display:inline-flex;align-items:center;gap:6px;border:0;border-radius:8px;background:rgba(255,255,255,.1);color:#fca5a5;font:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;opacity:0;pointer-events:none;max-width:0;padding:0;overflow:hidden;transition:opacity .18s,max-width .18s}
  .tb-del.on{opacity:1;pointer-events:all;max-width:200px;padding:7px 13px;border:1.5px solid rgba(252,165,165,.45)}
  .tb-del:hover{background:rgba(239,68,68,.25);border-color:#fca5a5;color:#fff}
  .tb-del svg{width:13px;height:13px}
  .tb-cnt{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:8px;background:#ef4444;color:#fff;font-size:10px;font-weight:800;padding:0 5px}
  /* phone: country-code picker + number */
  .tel-wrap{display:flex;align-items:center;gap:4px;width:100%}
  .tel-cc{display:inline-flex;align-items:center;gap:4px;flex:0 0 auto;height:30px;padding:0 6px;border:1px solid #cfd9e8;border-radius:6px;background:#fff;cursor:pointer;font:inherit;font-size:12px;color:#1e293b}
  .tel-cc:hover{border-color:var(--navy)}
  .tel-cc img{width:20px;height:15px;object-fit:cover;border-radius:2px;display:block}
  .tel-cc svg{width:11px;height:11px;opacity:.55}
  .tel-num{flex:1 1 auto;min-width:0}
  .cc-drop{position:fixed;z-index:2147482300;width:290px;background:#fff;border:1.5px solid #dfe4ec;border-radius:10px;box-shadow:0 12px 34px rgba(15,23,42,.22);overflow:hidden;display:none}
  .cc-drop.vis{display:block}
  .cc-search{width:100%;border:0;border-bottom:1px solid #eef1f6;padding:9px 11px;font:inherit;font-size:12.5px;outline:none}
  .cc-list{max-height:230px;overflow:auto}
  .cc-item{display:flex;align-items:center;gap:9px;padding:7px 11px;cursor:pointer;font-size:12.5px}
  .cc-item:hover{background:var(--navy);color:#fff}
  .cc-item img{width:22px;height:16px;object-fit:cover;border-radius:2px;flex:0 0 auto}
  .cc-name{flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cc-dial{font-variant-numeric:tabular-nums;opacity:.7;flex:0 0 auto}
  td.num{cursor:pointer}

  .tscroll{overflow:auto;height:var(--bh,58vh)}
  table{width:max-content;min-width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
  thead th{position:sticky;top:0;z-index:1;background:var(--navy);color:rgba(255,255,255,.82);font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;text-align:left;padding:10px 12px;white-space:nowrap}
  /* Expand Row — the whole row as one vertical page. Sits next to Add Row and
     appears only with a selection, because there is nothing to expand without
     one. Same pill shape as its neighbours. */
  .tb-exp{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border:1.5px solid rgba(255,255,255,.55);border-radius:8px;background:rgba(255,255,255,.12);color:#fff;font:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
  .tb-exp:hover{background:rgba(255,255,255,.22);border-color:#fff}
  .tb-exp svg{width:13px;height:13px}

  /* The expanded row. A sheet rather than a dialog: one column, scrolls
     vertically, reads the way the same record would on a phone. */
  .rx{position:fixed;inset:0;z-index:2147482500;display:flex;align-items:flex-start;justify-content:center;padding:20px;background:rgba(15,35,75,.58);backdrop-filter:blur(4px)}
  .rx[hidden]{display:none}
  .rx-box{width:min(560px,calc(100vw - 32px));max-height:calc(100vh - 40px);display:flex;flex-direction:column;overflow:hidden;border:1px solid #cbd9f1;border-radius:12px;background:#fff;box-shadow:0 28px 80px rgba(15,35,75,.32)}
  .rx-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 18px;background:linear-gradient(135deg,#1e3f85,#284f9e);color:#fff;flex:0 0 auto}
  .rx-head h2{font-size:14px;font-weight:800;letter-spacing:.01em}
  .rx-head p{font-size:11px;opacity:.8;margin-top:2px}
  .rx-x{border:0;background:rgba(255,255,255,.16);color:#fff;width:26px;height:26px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
  .rx-x:hover{background:rgba(255,255,255,.3)}
  .rx-x svg{width:13px;height:13px}
  .rx-body{overflow-y:auto;padding:4px 0 0;flex:1 1 auto;-webkit-overflow-scrolling:touch}
  .rx-sec{border-bottom:1px solid #eef1f6;padding:12px 18px 14px}
  .rx-sec:last-child{border-bottom:0}
  .rx-sec h3{font-size:10px;font-weight:800;color:#64748b;letter-spacing:.08em;text-transform:uppercase;margin-bottom:9px}
  .rx-f{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
  .rx-f>label{font-size:10.5px;font-weight:700;color:#475569;letter-spacing:.02em}
  .rx-f input,.rx-f textarea,.rx-f select{font:inherit;font-size:13px;padding:9px 10px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;color:var(--tx);width:100%}
  .rx-f input:focus,.rx-f textarea:focus,.rx-f select:focus{outline:2px solid var(--navy);outline-offset:-1px;border-color:var(--navy)}
  .rx-f textarea{resize:vertical;min-height:64px}
  .rx-f .rx-saved{font-size:10.5px;color:#15803d;font-weight:700}
  .rx-f .rx-err{font-size:10.5px;color:#ba0517;font-weight:700}
  .rx-map{border:1px solid #dbe4f0;border-radius:8px;overflow:hidden;background:#eef2f7}
  .rx-map .mapwrap{position:relative;height:170px;overflow:hidden}
  .rx-map a{display:block;padding:8px 10px;font-size:11.5px;color:#2563eb;text-decoration:none;background:#fff;border-top:1px solid #eef1f6;word-break:break-all}
  .rx-none{font-size:12px;color:#94a3b8;padding:8px 0}
  /* Sticky footer: on a long sheet Save must be reachable without scrolling
     back down, which is the whole point of a one-column layout on a phone. */
  .rx-foot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 18px;border-top:1px solid #e2e8f0;background:#fff}
  .rx-status{font-size:11.5px;color:#475569}
  .rx-status.ok{color:#15803d;font-weight:700}
  .rx-status.bad{color:#ba0517;font-weight:700}
  .rx-save{border:0;border-radius:8px;background:var(--navy);color:#fff;font:inherit;font-size:12.5px;font-weight:700;padding:9px 20px;cursor:pointer}
  .rx-save:hover{background:#1F3F80}
  .rx-save:disabled{opacity:.55;cursor:not-allowed}
  /* Drafting a quotation is a secondary action next to Save — same blue family,
     lighter weight, so the primary action stays obvious. */
  .qv-draft.alt{background:#e8f0fd;color:var(--navy);border:1px solid #b9d0f2}
  .qv-draft.alt:hover{background:#dbe8fb}

  /* Quick quotation card. Light blue so it reads as a working surface attached
     to the selection rather than another table. Radii follow OCE's scale. */
  .qv{margin:14px 0 8px;border:1px solid #bcd6f5;background:#eff6ff;border-radius:12px;padding:14px 16px}
  .qv-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
  .qv-head h2{font-size:13px;font-weight:800;color:var(--navy);letter-spacing:.01em}
  .qv-for{font-size:11.5px;color:#4a5568;margin-top:2px}
  .qv-x{border:0;background:transparent;color:#64748b;cursor:pointer;padding:4px;border-radius:6px;display:inline-flex}
  .qv-x:hover{background:#dbeafe;color:var(--navy)}
  .qv-x svg{width:14px;height:14px}
  .qv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:9px}
  .qv-grid-wide{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-top:9px}
  .qv-f{display:flex;flex-direction:column;gap:4px;min-width:0}
  .qv-f>span{font-size:10.5px;font-weight:700;color:#475569;letter-spacing:.03em;text-transform:uppercase}
  .qv-f input,.qv-f textarea{font:inherit;font-size:12.5px;padding:7px 9px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;color:var(--tx);min-width:0;width:100%}
  .qv-f input:focus,.qv-f textarea:focus{outline:2px solid var(--navy);outline-offset:-1px;border-color:var(--navy)}
  .qv-f textarea{resize:vertical}
  .qv-span{grid-column:1/-1}
  .qv-more{margin-top:10px}
  .qv-more summary{font-size:11.5px;font-weight:700;color:var(--navy);cursor:pointer;user-select:none;padding:4px 0}
  .qv-foot{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-top:13px;padding-top:11px;border-top:1px solid #bcd6f5}
  .qv-totals{display:flex;align-items:center;gap:16px;font-size:11.5px;color:#475569;flex-wrap:wrap}
  .qv-totals b{color:var(--tx);font-weight:700;margin-left:4px}
  .qv-total{font-size:13px;color:var(--navy);font-weight:700}
  .qv-total b{color:var(--navy);font-size:15px;font-weight:800}
  .qv-actions{display:flex;align-items:center;gap:10px}
  .qv-msg{font-size:11.5px;color:#475569}
  .qv-msg.ok{color:#15803d;font-weight:700}
  .qv-msg.bad{color:#ba0517;font-weight:700}
  .qv-draft{border:0;border-radius:8px;background:var(--navy);color:#fff;font:inherit;font-size:12.5px;font-weight:700;padding:9px 16px;cursor:pointer;white-space:nowrap}
  .qv-draft:hover{background:#1F3F80}
  .qv-draft:disabled{opacity:.55;cursor:not-allowed}

  /* # header doubles as select-all. It has to read as pressable — an unstyled
     <th> gives no hint that it does anything. .on is the all-selected state. */
  thead th.num-head{cursor:pointer;user-select:none}
  thead th.num-head:hover{background:#2f5cb3;color:#fff}
  thead th.num-head:focus-visible{outline:2px solid #fff;outline-offset:-2px}
  thead th.num-head.on{background:#fff;color:var(--navy)}
  /* column resize (ported from tabbed_grid.js .pg-rz). The handle positions
     against the th, which is already `position:sticky` and therefore a
     containing block for absolute children. */
  .rz{position:absolute;top:0;right:-2px;width:7px;height:100%;cursor:col-resize;z-index:5;touch-action:none}
  thead th:last-child .rz{right:0;width:4px}
  .rz:hover,.rz.rz-active{background:rgba(255,255,255,.28)}
  body.col-resizing{cursor:col-resize!important;user-select:none}
  body.col-resizing *{cursor:col-resize!important}
  tbody td{height:40px;padding:0 12px;border-bottom:1px solid var(--hair);border-right:1px solid var(--hair);vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  tbody td.wide{max-width:340px}
  tbody tr.data:nth-child(even) td{background:#f8faff}
  tbody tr.data:hover td{background:#eef4fd}
  .num{width:46px;text-align:center}
  tbody tr.selectable-row td.num{cursor:pointer;user-select:none;padding:0}
  .rn{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:8px;background:#eff6ff;color:var(--navy);font-weight:800;font-size:11px}
  tbody tr.selectable-row:hover .rn{background:var(--navy);color:#fff}
  tbody tr.selectable-row.row-selected td{background:#dbeafe!important}
  tbody tr.selectable-row.row-selected:hover td{background:#bfdbfe!important}
  tbody tr.selectable-row.row-selected .rn{background:var(--navy);color:#fff}
  .dt{font-variant-numeric:tabular-nums;color:#334155}
  .mt{color:#9ca3af}
  .name{font-weight:700;color:#111827}
  .lnk{color:var(--navy);text-decoration:none}.lnk:hover{text-decoration:underline}
  .ph{font-variant-numeric:tabular-nums}
  .wa{display:inline-flex;align-items:center;justify-content:center;margin-left:6px;color:#15803d;background:#e7f5ee;border-radius:6px;padding:3px 5px;text-decoration:none}
  .wa svg{width:14px;height:14px;display:block}
  .avatar{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:#334f8a;color:#fff;font-size:10px;font-weight:800}
  .badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:99px;font-size:11px;font-weight:800;white-space:nowrap;border:1px solid transparent;text-transform:capitalize}
  .b-open{background:#e8f4fd;color:#014486;border-color:#b0d4f1}
  .b-scheduled{background:#ece9f5;color:#3e3794;border-color:#c5bde8}
  .b-viewed{background:#e0f5f5;color:#0a5f6e;border-color:#8dd5d8}
  .b-cancelled{background:#f3f3f3;color:#706e6b;border-color:#c9c7c5}
  .b-done{background:#eff9ef;color:#2e6b3e;border-color:#95d5a0}
  .tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;background:#f1f5f9;color:#475569;text-transform:capitalize;white-space:nowrap}
  /* maps cell (ported from the tabbed grid): Open button + copy + hover preview */

<script>
const isJwt = s => typeof s==='string' && /^eyJ[\w-]+\.[\w-]+\.[\w-]+$/.test(s);
function jwtPayload(t){
  try{ let p=t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'); while(p.length%4) p+='=';
    return JSON.parse(atob(p)); }catch(e){ return null; }
}
/* Both tokens this API issues are JWTs, so "looks like a JWT" is not enough to
   identify an access token. The scan below walks every storage key, and a
   refresh token sitting in one of them would be picked up and sent as a bearer
   — which the API rejects, so every request 401s forever. The payload carries
   type:"access" | "refresh"; anything typed "refresh" is excluded. Tokens with
   no type claim are still accepted, so older sessions keep working. */
const isAccessJwt = s => isJwt(s) && (jwtPayload(s)||{}).type!=='refresh';
function scanStorage(match){
  for(const store of [localStorage, sessionStorage]){
    for(let i=0;i<store.length;i++){ const v=store.getItem(store.key(i));
      if(match(v)) return v;
      if(v && v[0]==='{'){ try{ const o=JSON.parse(v);
        for(const c of [o.access_token,o.refresh_token,o.token,o.state&&o.state.access_token,o.state&&o.state.refresh_token,o.state&&o.state.token])
          if(match(c)) return c;
      }catch(e){} } }
  }
  return null;
}
function getToken(){
  const direct = localStorage.getItem('oe_access_token');
  if(isAccessJwt(direct)) return direct;
  return scanStorage(isAccessJwt);
}
function getRefreshToken(){
  const direct = localStorage.getItem('oe_refresh_token');
  if(isJwt(direct)) return direct;
  return scanStorage(s => isJwt(s) && (jwtPayload(s)||{}).type==='refresh');
}
let TOKEN=getToken();   // reassigned by refreshToken() when the access token expires
const API='/api/v1/achi';
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fail=m=>{const e=$('err');e.textContent=m;e.style.display='block';};
const clearErr=()=>{$('err').style.display='none';};
const validEmail=v=>!String(v||'').trim()||/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(v).trim());
const validLebanonMobile=n=>/^(?:03\d{6}|3\d{6}|(?:70|71|76|78|79|81)\d{6})$/.test(n);
const validMobile=v=>{const s=String(v||'').trim();if(!s)return true;if(!/^([0-9 +_\-,.*#()]){1,20}$/.test(s))return false;const digits=s.replace(/\D/g,'');if(/^\+?961(?:\D|$)/.test(s))return validLebanonMobile(digits.slice(3));return digits.length>=7&&digits.length<=15;};
function showInvalidValue(input,title,message){
  input&&input.classList.add('email-invalid');
  const existing=document.querySelector('.feedback');
  if(existing) return;
  const modal=document.createElement('div');
  modal.className='feedback'; modal.setAttribute('role','dialog'); modal.setAttribute('aria-modal','true'); modal.setAttribute('aria-labelledby','feedback-title');

/* Access tokens last an hour (expires_in 3600). Leave this page open longer and
   every call 401s. The API issues a refresh token alongside, so swap it for a
   new access token and retry once — the user sees nothing. Shared promise so a
   burst of parallel 401s triggers one refresh, not one per request. */
let refreshing=null;
function refreshToken(){
  if(refreshing) return refreshing;
  const rt=getRefreshToken();
  if(!rt) return Promise.resolve(false);
  refreshing=fetch('/api/v1/users/auth/refresh/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refresh_token:rt})})
    .then(r=>r.ok?r.json():null)
    .then(d=>{ if(d&&d.access_token){ TOKEN=d.access_token;
      try{ localStorage.setItem('oe_access_token',TOKEN); if(d.refresh_token) localStorage.setItem('oe_refresh_token',d.refresh_token); }catch(e){}
      return true; } return false; })
    .catch(()=>false)
    .finally(()=>{ refreshing=null; });
  return refreshing;
}
async function api(path,opts={},retried){
  const r=await fetch(API+path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+TOKEN,...(opts.headers||{})}});
  if(r.status===401){
    if(!retried && await refreshToken()) return api(path,opts,true);
    // message, not "401": callers do fail(e.message), which used to overwrite
    // the explanation with the bare status code
    fail('Session expired — open the main app on this exact host, sign in, then reload.');
    throw new Error('Session expired — open the main app on this exact host, sign in, then reload.'); }
  const body=await r.json().catch(()=>({}));
  if(!r.ok){ const d=body.detail; throw new Error(Array.isArray(d)?d.map(x=>x.msg).join('; '):(d||r.status)); }
  return body;
}
async function searchContacts(q,retried){
  const url='/api/v1/contacts/search/?q='+encodeURIComponent(q)+'&limit=12';
  const r=await fetch(url,{headers:{Authorization:'Bearer '+TOKEN}});
  if(r.status===401){
    if(!retried && await refreshToken()) return searchContacts(q,true);
    throw new Error('Session expired'); }
  const body=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(body.detail||r.status);
  return Array.isArray(body.items)?body.items:[];
}

/* ── column widths (ported from tabbed_grid.js _wireColResize) ─────────────
 * Widths are per-column and remembered per browser, so someone who widens
 * "What was said" keeps it wide tomorrow. The table is `table-layout:fixed`,
 * so setting the th width is what actually sizes the column — the body cells
 * follow it and nothing has to be touched per row. */
const COLW_KEY='achi_log_col_widths', COLW_MIN=48;
let COLW={};
function loadColWidths(){
  try{ COLW=JSON.parse(localStorage.getItem(COLW_KEY)||'{}')||{}; }catch(e){ COLW={}; }
}
function saveColWidths(){
  try{ localStorage.setItem(COLW_KEY,JSON.stringify(COLW)); }catch(e){}
}
const colWidth=c=>Math.max(COLW_MIN, Number(COLW[c.k])||c.w);
function buildHead(){
  $('thead').innerHTML=COLS.map(c=>{
    // The # header doubles as select-all: the rows already select by clicking
    // their own number cell, so the column header toggling the whole column is
    // where people look for it. role/aria-pressed because a <th> is not a button.
    const sel=c.k==='num'
      ? ` class="${c.cls||''} num-head" role="button" tabindex="0" aria-pressed="false" title="Select or unselect all rows"`
      : ` class="${c.cls||''}"`;
    return `<th data-tab="${c.tab??''}" data-k="${c.k}"${sel} style="width:${colWidth(c)}px">`
      +`${c.h}<span class="rz" data-k="${c.k}" title="Drag to resize"></span></th>`;
  }).join('');
}
/* Pointer events rather than mouse, so this works on the tablet a surveyor
   carries as well as a desktop. One delegated listener on the header survives
   buildHead() being called again. */
function wireColResize(){
  const head=$('thead');
  if(!head || head.dataset.rzWired) return;
  head.dataset.rzWired='1';
  head.addEventListener('pointerdown',e=>{
    const handle=e.target.closest('.rz'); if(!handle) return;
    e.preventDefault(); e.stopPropagation();
    const th=handle.closest('th'), key=handle.dataset.k;
    if(!th||!key) return;
    const startX=e.clientX, startW=th.getBoundingClientRect().width;
    handle.classList.add('rz-active');
    document.body.classList.add('col-resizing');
    handle.setPointerCapture&&handle.setPointerCapture(e.pointerId);
    const move=ev=>{
      const next=Math.max(COLW_MIN,Math.round(startW+ev.clientX-startX));
      COLW[key]=next; th.style.width=next+'px';
    };
    const up=()=>{
      window.removeEventListener('pointermove',move);
      window.removeEventListener('pointerup',up);
      handle.classList.remove('rz-active');
      document.body.classList.remove('col-resizing');
      saveColWidths();
      moveIndToActive();   // the pill indicator tracks column offsets
    };
    window.addEventListener('pointermove',move);
    window.addEventListener('pointerup',up);
  });
  // Double-click a handle to put that column back to its designed width.

function moveIndToActive(){ const b=tabsEl&&tabsEl.querySelector('.pill-tab.on'); if(b) moveInd(b); }

function draftCell(c,dp,st,rowNumber){
  if(c.k==='num') return `<span class="rn">${rowNumber}</span>`;
  // Frappe's CRM Log draft rows show the actual creation value as
  // DD/MM/YYYY HH:MM instead of the relative placeholder "now".

  if(c.k==='status') return `<input class="din pg-select-input draft-popup-select" id="${dp}-status" data-dp="${dp}" data-dk="status" data-select-value="${esc(st.status||'open')}" value="${esc(label(st.status||'open'))}" readonly>`;
  if(c.k==='owner') return `<span class="mt">you</span>`;
  const id=`${dp}-${c.k}`, v=esc(st[c.k]||'');

    if(c.k==='prefix') return `<input class="din pg-select-input draft-popup-select" id="${id}" data-dp="${dp}" data-dk="prefix" data-select-value="${esc(st.prefix||'')}" value="${esc(st.prefix||'')}" readonly>`;
    if(c.k==='category') return `<input class="din pg-select-input draft-popup-select" id="${id}" data-dp="${dp}" data-dk="category" data-select-value="${esc(st.category||'')}" value="${esc(label(st.category||''))}" readonly>`;
    if(c.k==='type') return `<input class="din pg-select-input draft-popup-select" id="${id}" data-dp="${dp}" data-dk="type" data-select-value="${esc(st.type||'inbound_call')}" value="${esc(label(st.type||'inbound_call'))}" readonly>`; }
  if(c.draft==='date') return `<input class="din" id="${id}" data-dp="${dp}" data-dk="${c.k}" type="date" value="${v}">`;
  if(c.draft==='tel'){ const iso=st.iso||DEFAULT_ISO, dial=st.dial||DEFAULT_DIAL;

  if(c.draft==='text'){

    const type=c.k==='email'?' type="email" inputmode="email" autocomplete="email"':c.k==='first'?' autocomplete="off"':'';
    const inp=`<input class="din" id="${id}" data-dp="${dp}" data-dk="${c.k}" placeholder="${ph}" value="${v}"${type}${c.note?' data-note="1"':''}>`;
    if(c.note) return `<span class="note-wrap">${inp}<button type="button" class="note-exp" data-noteexp data-for="${id}" title="Open notes, files and drawing">${SVG.expand}</button></span>`;
    if(c.k==='email') return `<span class="draft-email">${inp}<button class="draft-compose" type="button" data-draft-compose="${id}" title="Compose email"${validEmail(st[c.k])&&st[c.k]?'':' hidden'}>${SVG.mail}</button></span>`;
    if(c.k==='maps') return `<span class="draft-map-wrap">${inp}<button type="button" class="map-edit" data-draft-map="${id}" title="Set map location">${SVG.pen}</button></span>`;
    return inp;

function draftRowHTML(dp,st,isTop,rowNumber){

/* Reflect the selection state on the # header. Guarded because render() calls

function refreshSelectionButton(){

function render(){

  const body=[
    draftRowHTML('d',topDraft,true,rowNumber++),
    rows.length?rows.map((r,i)=>dataRowHTML(r,i,rowNumber++)).join(''):'',
    bottomDrafts.map((st,i)=>draftRowHTML('b'+i,st,false,rowNumber++)).join(''),

/* Delete the selected rows. Uses the shared selectedRows set (keys are `log:<id>`)
   so it stays in step with the select-all / row-number selection. */
/* Draft rows are selectable too, and their keys are `draft:<dp>` rather than
   `log:<id>`. Deleting has to tell them apart: a saved row is deleted through the
   API, an unsaved draft row is simply discarded. Sending a draft key to
   DELETE /logs/ 404s and used to abort the whole batch, deleting nothing. */
const logKeys=()=>[...selectedRows].filter(k=>String(k).startsWith('log:'));
const draftKeys=()=>[...selectedRows].filter(k=>String(k).startsWith('draft:'));
function refreshDeleteButton(){
  const n=logKeys().length+draftKeys().length, del=$('btn-del');
  if(del){ del.classList.toggle('on', n>0); const c=$('del-count'); if(c) c.textContent=n; }
  // Expand needs exactly one saved row — the same condition the card uses.
  const exp=$('expand-row'); if(exp) exp.hidden=!selectedLogId();
  refreshQuickQuote();
}

/* ── quick quotation ────────────────────────────────────────────────────────
   Drafts a customer quotation from the selected row. OCE has no sales-side
   quotation module — rfq_bidding, bid_management and tendering all model us
   soliciting bids — so this posts to our own /logs/{id}/quotation.

   Shown only for exactly ONE selected saved row: a quotation is addressed to a
   single customer, and a draft row has no id to address it to. */
// qvHidden is scoped to ONE row: dismissing the card should not suppress it for
// the rest of the session, so selecting a different row brings it back.
let qvHidden=false, qvLastId=null;
const qvNum=id=>{ const v=parseFloat($(id).value); return isNaN(v)?0:v; };
function selectedLogId(){
  const logs=logKeys();
  if(logs.length!==1) return null;
  return logs[0].slice(4);   // strip "log:"
}
function refreshQuickQuote(){

/* Totals mirror quotation_service.compute_totals. Duplicated deliberately: this
   is a live preview and must not wait on a round trip. The SERVER's numbers are
   the ones stored — if the two ever disagree, the server is right. */
function qvTotals(){
  const hire=qvNum('qv-area')*qvNum('qv-weeks')*qvNum('qv-rate');
  let sub=hire+qvNum('qv-erection')+qvNum('qv-transport')+qvNum('qv-extras')-qvNum('qv-discount');
  if(sub<0) sub=0;
  const vat=sub*qvNum('qv-vat')/100;
  $('qv-sub').textContent=sub.toFixed(2);
  $('qv-vatv').textContent=vat.toFixed(2);
  $('qv-tot').textContent=(sub+vat).toFixed(2);
}
function qvMsg(text,cls){ const m=$('qv-msg'); m.textContent=text||''; m.className='qv-msg'+(cls?' '+cls:''); }

/* ── expanded row ───────────────────────────────────────────────────────────
   The selected row as one vertical page: every field stacked, the map rendered
   rather than linked, and quotation drafting at the bottom. Sections come from
   COLS' own tab numbers, so a column added to the table shows up here without
   anyone remembering to update this. */
const RX_SECTIONS=[
  {tab:null,title:'Status'},

  {tab:2,   title:'Site'},

const RX_LONG=new Set(['desc','updates','funotes']);

function rxFieldHTML(c,r){

  else if(c.edit&&(c.edit.kind==='status'||c.edit.kind==='type'||c.edit.kind==='category'||c.edit.kind==='prefix')){

    // minus the "＋ Add new…" sentinel, which is a command, not a value. In a
    // real <select> it is directly selectable and would be saved as a prefix.
    const opts=(selectPopupChoices(c.edit.kind)||[]).filter(o=>(typeof o==='string'?o:o.value)!==PREFIX_ADD);
    control=`<select ${attrs}>${opts.map(o=>{
      const val=typeof o==='string'?o:o.value; const lab=typeof o==='string'?label(o):(o.label||label(o.value));

function rxMapHTML(r){

  // blocks third-party frames, so an embed renders blank. See tileMap().
  return `<div class="rx-map"><div class="mapwrap" id="rx-mapwrap"></div>`
    +`<a href="${esc(url)}" target="_blank" rel="noreferrer">Open in Google Maps</a></div>`;
}

async function rxSaveAll(){
  const btn=$('rx-save'), st=$('rx-status');
  const fields=[...$('rx-body').querySelectorAll('[data-k]')];
  const r=ROWS.find(x=>x.id===rxRowId);
  if(!r){ st.textContent='Row not loaded'; st.className='rx-status bad'; return; }
  const changed=fields.filter(el=>{
    const c=COLS.find(x=>x.k===el.dataset.k);
    return c&&c.edit&&String(c.edit.val(r)??'')!==el.value.trim();
  });
  if(!changed.length){ st.textContent='Nothing to save'; st.className='rx-status'; return; }
  btn.disabled=true; st.textContent='Saving…'; st.className='rx-status';
  // Sequential, not Promise.all: these PATCH the same file and contact, and
  // firing them together interleaves writes to one row.
  let failed=0;
  for(const el of changed){ try{ await rxSave(el); }catch(e){ failed++; } }
  btn.disabled=false;
  if(failed){ st.textContent=`${failed} field(s) failed`; st.className='rx-status bad'; }
  else { st.textContent='Saved'; st.className='rx-status ok'; setTimeout(()=>{ st.textContent=''; },2000); }
}
function closeExpandedRow(){ $('rx').hidden=true; rxRowId=null; }

/* Field saves go through the SAME endpoints as the grid's inline editors, keyed
   off each column's own edit.target — so nothing here can save to a different
   place than the table would. */
async function rxSave(el){
  const c=COLS.find(x=>x.k===el.dataset.k); if(!c||!c.edit||!rxRowId) return;
  const r=ROWS.find(x=>x.id===rxRowId); if(!r) return;
  const note=$(el.id+'-note'), field=c.edit.field, target=c.edit.target;
  const nv=el.value.trim();
  if(String(c.edit.val(r)??'')===nv) return;                // nothing changed
  if(field==='email'&&nv&&!validEmail(nv)){ note.textContent='Invalid email'; note.className='rx-note rx-err'; return; }
  try{
    if(target==='file') await api('/files/'+r.file_id,{method:'PATCH',body:JSON.stringify({[field]:nv||null})});
    else if(target==='contact') await api('/files/'+r.file_id+'/contact',{method:'PATCH',body:JSON.stringify({[field]:nv||null})});
    else await api('/logs/'+r.id,{method:'PATCH',body:JSON.stringify({[field]:nv||null})});
    ROWS.forEach(x=>{ if((target==='log'&&x.id===r.id)||(target!=='log'&&x.file_id===r.file_id)) x[field]=nv; });
    note.textContent='Saved'; note.className='rx-note rx-saved';
    setTimeout(()=>{ if(note) note.textContent=''; },1600);
    render();                                                // keep the grid in step
  }catch(e){ note.textContent=e.message||'Could not save'; note.className='rx-note rx-err'; }
}
function rxTotals(){
  const n=id=>{ const v=parseFloat(($(id)||{}).value); return isNaN(v)?0:v; };
  let sub=n('rx-q-area')*n('rx-q-weeks')*n('rx-q-rate')+n('rx-q-erection')+n('rx-q-transport')+n('rx-q-extras')-n('rx-q-discount');
  if(sub<0) sub=0;
  const vat=sub*n('rx-q-vat')/100;
  $('rx-q-sub').textContent=sub.toFixed(2); $('rx-q-vatv').textContent=vat.toFixed(2);
  $('rx-q-tot').textContent=(sub+vat).toFixed(2);
}
async function rxDraftQuotation(){
  if(!rxRowId) return;
  const r=ROWS.find(x=>x.id===rxRowId); if(!r) return;
  const m=$('rx-q-msg'), btn=$('rx-q-draft');
  const val=id=>{ const el=$(id); const v=el?el.value.trim():''; return v===''?undefined:v; };
  const body={area_sqm:val('rx-q-area'),duration_weeks:val('rx-q-weeks'),rate:val('rx-q-rate'),
    erection:val('rx-q-erection'),transport:val('rx-q-transport'),extras:val('rx-q-extras'),
    discount:val('rx-q-discount'),vat_percent:val('rx-q-vat'),scope:val('rx-q-scope')};
  Object.keys(body).forEach(k=>body[k]===undefined&&delete body[k]);
  btn.disabled=true; m.textContent='Drafting…'; m.className='qv-msg';
  try{
    const q=await api(`/logs/${encodeURIComponent(r.file_id)}/quotation`,{method:'POST',body:JSON.stringify(body)});
    m.textContent=`Saved ${q.quotation_number} — total ${q.total} ${q.currency}`; m.className='qv-msg ok';
  }catch(e){ m.textContent=e.message||'Could not draft quotation'; m.className='qv-msg bad'; }
  finally{ btn.disabled=false; }
}
async function draftQuotation(){
  const id=selectedLogId();
  if(!id){ qvMsg('Select one row first.','bad'); return; }
  const btn=$('qv-draft'); btn.disabled=true; qvMsg('Drafting…');
  // Blank stays blank: the server fills customer fields from the row, and an
  // empty string here would overwrite them with nothing.
  const val=id2=>{ const v=$(id2).value.trim(); return v===''?undefined:v; };
  const body={
    area_sqm:val('qv-area'), duration_weeks:val('qv-weeks'), rate:val('qv-rate'),
    erection:val('qv-erection'), transport:val('qv-transport'), extras:val('qv-extras'),
    discount:val('qv-discount'), vat_percent:val('qv-vat'),
    scope:val('qv-scope'), notes:val('qv-notes'), site_city:val('qv-city'),
    valid_until:val('qv-valid'),
  };
  Object.keys(body).forEach(k=>body[k]===undefined&&delete body[k]);
  // The endpoint keys off the FILE, not the log row: a file is the enquiry a
  // quotation is addressed to, and one file can carry several log entries.
  const row=ROWS.find(x=>x.id===id);
  if(!row){ qvMsg('Row not loaded — reload and try again.','bad'); btn.disabled=false; return; }
  try{
    const q=await api(`/logs/${encodeURIComponent(row.file_id)}/quotation`,{method:'POST',body:JSON.stringify(body)});
    qvMsg(`Saved ${q.quotation_number} — total ${q.total} ${q.currency}`,'ok');
  }catch(e){ qvMsg(e.message||'Could not draft quotation','bad'); }
  finally{ btn.disabled=false; }
}
async function deleteSelected(){
  const logs=logKeys(), drafts=draftKeys();
  const n=logs.length+drafts.length;
  if(!n) return;
  if(!confirm(`Delete ${n} row${n>1?'s':''}? This cannot be undone.`)) return;
  clearErr();
  const failed=[];
  for(const k of logs){
    const id=String(k).slice(4);
    try{ await api('/logs/'+id,{method:'DELETE'}); selectedRows.delete(k); }
    catch(e){ failed.push(e.message); }          // keep going; one bad row must not stop the rest
  }
  // Unsaved draft rows: discard them locally. Bottom rows are spliced high index
  // first so earlier removals don't shift the ones still to go.
  const idx=[];
  for(const k of drafts){
    const dp=String(k).slice(6);
    selectedRows.delete(k);
    if(dp==='d') topDraft={}; else idx.push(+dp.slice(1));
  }
  idx.sort((a,b)=>b-a).forEach(i=>bottomDrafts.splice(i,1));
  await load();
  refreshDeleteButton();

   report an error to, and losing typed work is the worse failure. */
function flushDrafts(){
  if(!TOKEN) return;

  for(const [dp,st] of list){
    if(!st||!draftIsSaveable(st)||committing.has(dp)) continue;

/* Map preview built from OSM raster tiles as <img>.
 *
 * NOT openstreetmap.org/export/embed.html: the app serves this page with
 * `frame-src 'self' blob: data:`, so any third-party <iframe> is blocked and the
 * preview renders blank. `img-src` allows any https, so tiles are the one thing
 * that actually draws here. Verify with:
 *   curl -sD- -o/dev/null localhost:8080/api/v1/achi/ui | grep -i frame-src
 *
 * Mercator: x is linear in longitude; y needs the log-tangent projection. The
 * point is placed at the box centre and the pin is drawn over it, since a tile
 * carries no marker of its own. */
function tileMap(lat,lng,W,H,z){
  const n=Math.pow(2,z);
  const wx=((lng+180)/360)*n*256;
  const s=Math.sin(lat*Math.PI/180);
  const wy=(0.5-Math.log((1+s)/(1-s))/(4*Math.PI))*n*256;
  const tlX=wx-W/2, tlY=wy-H/2;
  let out='';
  for(let tx=Math.floor(tlX/256); tx*256<tlX+W; tx++){
    for(let ty=Math.floor(tlY/256); ty*256<tlY+H; ty++){
      if(ty<0||ty>=n) continue;
      const xx=((tx%n)+n)%n;
      out+=`<img class="mt-tile" src="https://tile.openstreetmap.org/${z}/${xx}/${ty}.png" style="left:${Math.round(tx*256-tlX)}px;top:${Math.round(ty*256-tlY)}px" alt="" referrerpolicy="no-referrer">`;
    }
  }
  return `<div class="tilemap" style="width:${W}px;height:${H}px">${out}<span class="maps-pin">${SVG.pin}</span></div>`;
}

/* ── shortcut: Shift+R adds a row ──────────────────────────────────────────
 * Ported from erp_next_custom/public/js/core/grid/tabbed_grid.js
 * (_installAddRowShortcut). Same contract: one document-level capture-phase
 * listener that CLICKS the visible "+" button rather than calling addBottomRow()
 * directly, so the shortcut and the mouse share one code path. Accepts the
 * physical KeyR as well as the produced "r"/"R" so it survives non-QWERTY layouts.
 */
function isTypingTarget(t){
  if(!t) return false;
  if(t.isContentEditable) return true;
  const tag=(t.tagName||'').toUpperCase();
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return true;
  return !!(t.closest && t.closest('input,textarea,select,[contenteditable]'));
}
document.addEventListener('keydown',e=>{
  if(!e.shiftKey||e.ctrlKey||e.metaKey||e.altKey) return;                 // plain Shift+R only
  if(e.code!=='KeyR' && String(e.key||'').toLowerCase()!=='r') return;    // layout-proof
  if(e.repeat) return;                                                    // ignore held-key repeat
  if(isTypingTarget(e.target)) return;                                    // not while typing a draft cell
  if($('rows').querySelector('.cellinput')) return;                       // not while an inline editor is open
  const btn=$('add-row');
  if(!btn) return;
  e.preventDefault(); e.stopPropagation();
  btn.click();
},true);

function openEditor(td){
  if(td.querySelector('input,select')) return;

  const tr=td.closest('tr'), logId=tr.dataset.log, fileId=tr.dataset.file;
  let el;

  if(field==='mobile'){
    const raw=String(val||'').trim();
    let iso=DEFAULT_ISO, dial=DEFAULT_DIAL, num='';

      if(raw.startsWith(cDial)){ iso=cIso; dial=cDial; num=raw.slice(cDial.length).trim(); break; }
    }
    if(!num && raw.startsWith('+')){
      const m=raw.match(/^\+(\d{1,3})/);

    wrap.appendChild(ccBtn); wrap.appendChild(el); td.innerHTML=''; td.appendChild(wrap);

  }

  q('.pg-note-upload').addEventListener('click',()=>{
    const inp=document.createElement('input');
    inp.type='file'; inp.multiple=true; inp.accept='.pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,image/*';
    inp.addEventListener('change',()=>{ pendingFiles.push(...Array.from(inp.files||[])); renderFiles(); },{once:true});
    inp.click();
  });

  filesEl.addEventListener('click',async e=>{
    const link=e.target.closest('[data-open]');
    if(link){ e.preventDefault();
      try{ await openAttachment(link.dataset.open); }catch(err){ statusEl.textContent=err.message; }
      return; }
    const btn=e.target.closest('[data-del],[data-pending]'); if(!btn) return;
    if(btn.dataset.pending!==undefined){ pendingFiles.splice(+btn.dataset.pending,1); renderFiles(); return; }
    const id=btn.dataset.del; btn.disabled=true;
    try{
      const r=await fetch(`${API}/attachments/${id}`,{method:'DELETE',headers:{Authorization:'Bearer '+TOKEN}});
      if(!r.ok) throw new Error('Could not remove the file');
      attached=attached.filter(f=>f.id!==id); renderFiles();
      const row=ROWS.find(x=>x.id===logId); if(row) row.attachment_count=attached.length;
    }catch(err){ btn.disabled=false; statusEl.textContent=err.message; }
  });

  drawBtn.addEventListener('click',async()=>{
    if(saving) return;
    if(typeof achi_drawing==='undefined'){ statusEl.textContent='Drawing tool is unavailable.'; return; }
    saving=true; drawBtn.disabled=true; saveBtn.disabled=true; statusEl.textContent='Preparing drawing…';
    let initial='';
    try{ await persistNote(); initial=(await api(`/logs/${logId}/drawing`)).drawing||''; }
    catch(e){ statusEl.textContent=e.message||'Could not open the drawing.'; drawBtn.disabled=false; saveBtn.disabled=false; saving=false; return; }
    ov.style.display='none';   // hidden, not destroyed: the notes come back untouched
    achi_drawing.open({
      title:`Drawing — ${col.h}`,
      initial,
      async onSave(json,hasShapes){
        await api('/logs/'+logId,{method:'PATCH',body:JSON.stringify({drawing:json})});
        const row=ROWS.find(r=>r.id===logId); if(row) row.has_drawing=hasShapes?1:0;
        drawBtn.classList.toggle('has-content',!!hasShapes);
        statusEl.textContent=hasShapes?'Drawing saved.':'Drawing cleared.';
      },
      onClose(){
        if(!ov.isConnected) return;
        ov.style.display='flex'; drawBtn.disabled=false; saveBtn.disabled=false; saving=false;
        requestAnimationFrame(()=>ta.focus());
      },
    });
  });

  q('.pg-note-workspace-close').addEventListener('click',close);
  q('.pg-note-cancel').addEventListener('click',close);
  ov.addEventListener('mousedown',e=>{ if(e.target===ov) close(); });
  ta.addEventListener('keydown',e=>{ e.stopPropagation();
    if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); saveAndContinue(); } });
  ov.addEventListener('keydown',e=>{ if(e.key==='Escape'){ e.stopPropagation(); close(); } });
  saveBtn.addEventListener('click',saveAndContinue);

  drawBtn.classList.toggle('has-content',!!row.has_drawing);
  renderFiles(); loadFiles();
  requestAnimationFrame(()=>{ ta.focus(); ta.setSelectionRange(ta.value.length,ta.value.length); });
}

/* The highlighted entry row is not in the database yet. Frappe still opens its
   note workspace there, so keep files and drawing on the draft state and flush
   them immediately after POST /logs/ gives the row a real log id. */
function openDraftNoteWorkspace(input){
  const dp=input.dataset.dp, key=input.dataset.dk, st=stateFor(dp); if(!st) return;
  const col=COLS.find(c=>c.k===key)||{h:'Notes'};
  st.__pendingFiles=st.__pendingFiles||[];
  document.querySelector('.pg-note-workspace')?.remove();
  const ov=document.createElement('div'); ov.className='pg-note-workspace'; ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
  ov.innerHTML=`<div class="pg-note-workspace-box">
    <div class="pg-note-workspace-head"><div><div class="pg-note-workspace-title">${esc(col.h)}</div><div class="pg-note-workspace-sub">Notes, documents, PDFs, images, and drawing</div></div><div class="pg-note-workspace-head-actions"><button type="button" class="pg-note-head-tool pg-note-upload"><span>&#128206;</span> Files</button><button type="button" class="pg-note-head-tool pg-note-drawing"><span>&#9998;</span> Drawing</button><button type="button" class="pg-note-workspace-close" aria-label="Close">&times;</button></div></div>
    <div class="pg-note-workspace-body"><label class="pg-note-workspace-label">Notes</label><textarea class="pg-note-workspace-text" placeholder="Add your notes here…">${esc(st[key]||'')}</textarea><div class="pg-note-files"></div><div class="pg-note-workspace-status">Files and drawing will upload when this row is saved.</div></div>
    <div class="pg-note-workspace-foot"><div class="pg-note-workspace-hint">Enter saves and continues &middot; Shift+Enter adds a line</div><div class="pg-note-workspace-actions"><button type="button" class="pg-note-cancel">Cancel</button><button type="button" class="pg-note-save">Save &amp; Continue</button></div></div>
  </div>`;
  document.body.appendChild(ov);
  const q=s=>ov.querySelector(s), ta=q('.pg-note-workspace-text'), files=q('.pg-note-files'), draw=q('.pg-note-drawing');
  const renderFiles=()=>{ files.innerHTML=st.__pendingFiles.map((f,i)=>`<div class="pg-note-file"><span>${esc(f.name)}</span><span class="pg-note-file-right"><span class="pg-note-file-pending">Ready to upload</span><button type="button" class="pg-note-file-del" data-pending="${i}" title="Remove">&times;</button></span></div>`).join('')||'<div class="pg-note-file"><span>No files attached yet</span></div>'; };
  const close=()=>ov.remove();
  const save=()=>{ st[key]=ta.value; input.value=ta.value; close(); const ins=draftInputs(dp), i=ins.indexOf(input); if(i>=0&&ins[i+1]) ins[i+1].focus(); };
  q('.pg-note-upload').onclick=()=>{ const pick=document.createElement('input'); pick.type='file'; pick.multiple=true; pick.accept='.pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,image/*'; pick.onchange=()=>{ st.__pendingFiles.push(...Array.from(pick.files||[])); renderFiles(); }; pick.click(); };
  files.onclick=e=>{ const b=e.target.closest('[data-pending]'); if(b){ st.__pendingFiles.splice(+b.dataset.pending,1); renderFiles(); } };
  draw.onclick=()=>{ if(typeof achi_drawing==='undefined') return; ov.style.display='none'; achi_drawing.open({title:`Drawing — ${col.h}`,initial:st.__drawing||'',onSave(json){st.__drawing=json;draw.classList.add('has-content');},onClose(){if(ov.isConnected){ov.style.display='flex';requestAnimationFrame(()=>ta.focus());}}}); };
  q('.pg-note-workspace-close').onclick=close; q('.pg-note-cancel').onclick=close; q('.pg-note-save').onclick=save;
  ov.onmousedown=e=>{if(e.target===ov)close();}; ta.onkeydown=e=>{e.stopPropagation();if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();save();}};
  draw.classList.toggle('has-content',!!st.__drawing); renderFiles(); requestAnimationFrame(()=>ta.focus());
}

async function load(){ try{ ROWS=await api('/logs/'); stats(); render(); }catch(e){ fail(e.message); } }

/* tabs = scroll positions */
const tabsEl=$('tabs'), ind=$('ind'), outer=$('touter');
function moveInd(b){ ind.style.left=b.offsetLeft+'px'; ind.style.width=b.offsetWidth+'px'; }
function firstThForTab(n){ return $('thead').querySelector(`th[data-tab="${n}"]`); }
function maxHorizontalScroll(){ return Math.max(0,outer.scrollWidth-outer.clientWidth); }
function scrollToTab(n){ const th=firstThForTab(n); if(th) outer.scrollTo({left:n===0?0:n===3?maxHorizontalScroll():th.offsetLeft-8,behavior:'smooth'}); setActivePill(n); }
function setActivePill(n){ activeTab=n; tabsEl.querySelectorAll('.pill-tab').forEach(b=>{const on=+b.dataset.tab===n;b.classList.toggle('on',on);if(on)moveInd(b);}); }
function tabFromScroll(){ const max=maxHorizontalScroll(); let best=0; if(max>0&&outer.scrollLeft>=max-2) best=3; else{const x=outer.scrollLeft+60;[0,1,2,3].forEach(n=>{const th=firstThForTab(n);if(th&&th.offsetLeft<=x)best=n;});} if(best!==activeTab)setActivePill(best); }
tabsEl.querySelectorAll('.pill-tab').forEach(b=>b.onclick=()=>scrollToTab(+b.dataset.tab));
let sraf=0; outer.addEventListener('scroll',()=>{ $('totop').classList.toggle('show',outer.scrollTop>200); if(sraf)return; sraf=requestAnimationFrame(()=>{sraf=0;tabFromScroll();}); });
$('totop').onclick=()=>outer.scrollTo({top:0,behavior:'smooth'});
window.addEventListener('load',()=>moveInd(tabsEl.querySelector('.pill-tab.on')));
$('k-open-card').onclick=()=>{ openOnly=!openOnly; $('k-open-card').classList.toggle('on',openOnly); render(); };
$('q').oninput=render;

/* bottom drag strip resizes table height (persisted) */
(function(){
  const saved=+localStorage.getItem('achi_bh'); if(saved>160) outer.style.setProperty('--bh',saved+'px');
  $('vrz').addEventListener('pointerdown',e=>{
    const start={y:e.clientY,h:outer.getBoundingClientRect().height}; document.body.classList.add('resizing');
    const mv=ev=>{ const h=Math.max(180,Math.min(1400,start.h+(ev.clientY-start.y))); outer.style.setProperty('--bh',h+'px'); };
    const up=()=>{ window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up); document.body.classList.remove('resizing');
      localStorage.setItem('achi_bh',Math.round(outer.getBoundingClientRect().height)); };
    window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up);
  });
})();

/* boot */
$('totop').innerHTML=SVG.up;
$('btn-del').innerHTML=SVG.trash+'<span>Delete</span> <span class="tb-cnt" id="del-count">0</span>';
loadColWidths(); buildHead(); wireColResize(); setActivePill(0); render();
if(!TOKEN) fail('Not signed in on this host. Open the main app at THIS address (same localhost/IP), sign in, then reload.');
else { load(); }
</script>
