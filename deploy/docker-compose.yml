name: achi-erp

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openconstructionerp}
      POSTGRES_USER: ${POSTGRES_USER:-oce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # pg_trgm/uuid-ossp: prod compose upstream never mounts init.sql. The app
      # tolerates their absence, but fuzzy search is better with them.
      - ./init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oce} -d ${POSTGRES_DB:-openconstructionerp}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        OCE_VERSION: ${OCE_VERSION:-11.9.0}
    restart: unless-stopped
    depends_on:
      postgres: {condition: service_healthy}
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-oce}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-openconstructionerp}
      # Every shipped upstream artifact leaves this at "development", which silently
      # disables the JWT gate, the CORS gate and hides nothing at /api/docs.
      APP_ENV: production
      APP_DEBUG: "false"
      # Refuses to boot if weak or <32 chars. Generated by bootstrap.sh.
      JWT_SECRET: ${JWT_SECRET:?run ./bootstrap.sh to generate}
      SERVE_FRONTEND: "1"
      SEED_DEMO: "false"
    volumes:
      - appdata:/data          # HOME=/data -> holds ~/.openestimate AND the packs
    expose: ["8080"]

  caddy:
    # Custom build: stock caddy has no response-rewrite, which we need to inject
    # the ACHI stylesheet into <head>. See overrides/README.md.
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    depends_on: [app]
    ports: ["80:80", "443:443"]
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?set to your domain, or :80 for IP-only}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./overrides:/srv/overrides:ro   # bind-mounted: edit CSS, restart caddy, no rebuild
      - caddydata:/data
      - caddyconfig:/config

volumes: {pgdata: {}, appdata: {}, caddydata: {}, caddyconfig: {}}
